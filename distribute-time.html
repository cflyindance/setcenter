<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>选择下发时间 - 下发屏保</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/common.css" />
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#1677ff', 'sidebar-bg': '#fafafa', 'sidebar-active': '#e6f4ff' }, borderRadius: { ant: '6px' } } } };
  </script>
</head>
<body class="bg-white text-gray-900 antialiased">
  <div class="min-h-screen flex flex-col">
    <header class="flex-shrink-0 border-b border-gray-200 bg-white">
      <div class="flex items-center justify-between px-4 py-3">
        <div class="flex items-center gap-2">
          <a href="channel-select.html" class="p-2 rounded hover:bg-gray-100 text-gray-600" aria-label="返回">←</a>
          <h1 class="text-base font-semibold">选择下发时间</h1>
        </div>
        <a href="effective-time.html" id="nextLink" class="px-4 py-2 rounded-ant bg-primary text-white hover:bg-blue-600">Next →</a>
      </div>
      <div class="step-progress w-full">
        <div class="step-progress-inner" style="width: 75%"></div>
      </div>
    </header>
    <main class="flex-1 p-6 max-w-2xl mx-auto w-full">
      <h2 class="text-base font-semibold text-gray-800 mb-4">选择下发时间</h2>
      <div class="flex items-start gap-2 p-3 rounded-ant bg-blue-50 text-blue-800 text-sm mb-6">
        <span aria-hidden="true">ℹ️</span>
        <p>During peak times, the update wait time may be longer. Please try to perform updates (scheduled) during off-peak times.</p>
      </div>
      <div class="space-y-4">
        <div>
          <span class="block text-sm font-medium text-gray-700 mb-2">下发时间</span>
          <div class="flex gap-4">
            <label class="inline-flex items-center gap-2 cursor-pointer">
              <input type="radio" name="distributeType" value="custom" checked class="text-primary" />
              <span>自定义</span>
            </label>
            <label class="inline-flex items-center gap-2 cursor-pointer">
              <input type="radio" name="distributeType" value="now" class="text-primary" />
              <span>立即</span>
            </label>
          </div>
        </div>
        <div id="timePickerWrap">
          <label class="block text-sm font-medium text-gray-700 mb-2">选择时间 <span class="text-red-500">*</span></label>
          <div class="flex flex-wrap gap-2 items-center">
            <input type="date" id="dateInput" class="flex-1 min-w-[140px] px-3 py-2 border border-gray-200 rounded-ant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" title="选择年月日" />
            <input type="time" id="timeInput" class="w-28 px-3 py-2 border border-gray-200 rounded-ant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" title="选择时分" />
          </div>
          <p class="text-gray-500 text-xs mt-1">点击日期框选择年/月/日，点击时间框选择时/分</p>
        </div>
      </div>
    </main>
  </div>
  <script>
    (function() {
      var wrap = document.getElementById('timePickerWrap');
      var dateInput = document.getElementById('dateInput');
      var timeInput = document.getElementById('timeInput');
      var customRadio = document.querySelector('input[name="distributeType"][value="custom"]');
      var nowRadio = document.querySelector('input[name="distributeType"][value="now"]');

      function toggleTimePicker() {
        if (customRadio && customRadio.checked) {
          wrap.classList.remove('hidden');
        } else {
          wrap.classList.add('hidden');
        }
      }
      if (customRadio) customRadio.addEventListener('change', toggleTimePicker);
      if (nowRadio) nowRadio.addEventListener('change', toggleTimePicker);
      toggleTimePicker();

      function setNow() {
        var d = new Date();
        var dateStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        var timeStr = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        if (dateInput) dateInput.value = dateStr;
        if (timeInput) timeInput.value = timeStr;
      }
      if (dateInput && !dateInput.value) setNow();

      document.getElementById('nextLink').addEventListener('click', function(e) {
        e.preventDefault();
        var custom = document.querySelector('input[name="distributeType"][value="custom"]');
        var dateVal = dateInput ? dateInput.value : '';
        var timeVal = timeInput ? timeInput.value : '';
        if (custom && custom.checked && dateVal && timeVal) {
          try {
            localStorage.setItem('distribute_date', dateVal);
            localStorage.setItem('distribute_time', timeVal);
          } catch (err) {}
        } else if (custom && custom.checked) {
          var d = new Date();
          dateVal = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
          timeVal = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
          try {
            localStorage.setItem('distribute_date', dateVal);
            localStorage.setItem('distribute_time', timeVal);
          } catch (err) {}
        } else {
          var d = new Date();
          try {
            localStorage.setItem('distribute_date', d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'));
            localStorage.setItem('distribute_time', String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0'));
          } catch (err) {}
        }
        window.location.href = 'effective-time.html';
      });
    })();
  </script>
</body>
</html>
