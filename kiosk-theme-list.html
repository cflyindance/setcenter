  <style>
    /* 预览打开时：抽屉高度固定为 max(横/竖在框内所需) 的上限「min(88vh, 800px)」，横竖切换仅内容缩放，外层高度不变 */
    #previewDrawer[data-preview-fixed-h="1"] {
      height: min(88vh, 800px);
      max-height: 800px;
    }
    #previewDrawer[data-preview-fixed-h="1"] #previewMediaStage {
      min-height: 0;
      flex: 1 1 0%;
    }
    #previewDrawer[data-preview-fixed-h="1"] #previewAspectBox {
      min-height: 0;
      flex: 1 1 0%;
    }
    #previewDrawer[data-preview-fixed-h="1"] #previewZoomTarget {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      max-height: 100%;
      min-height: 0;
      touch-action: none;
    }
    #previewZoomTarget.preview-pan-dragging {
      transition: none !important;
    }
    #previewAspectBox[data-preview-pan-scale]:not([data-preview-pan-scale="1"]) {
      cursor: grab;
    }
    #previewAspectBox.preview-pan-dragging {
      cursor: grabbing;
    }
    /* 等比缩放以完整落入预览框：contain 不裁切，横竖留白由舞台背景衬托 */
    #previewDrawer[data-preview-fixed-h="1"] #previewImage,
    #previewDrawer[data-preview-fixed-h="1"] #previewVideo {
      width: 100%;
      height: 100%;
      max-height: none !important;
      max-width: none !important;
      min-width: 0;
      min-height: 0;
      object-fit: contain;
      object-position: center;
    }
  </style>

  <!-- 上架拦截：仅与列表为「已上架」的主题在相同门店+渠道上比对时间重叠（不比对待上架、已下架） -->
  <div id="publishBlockModal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/[0.45] p-4" aria-hidden="true">
    <div class="ui-dialog-panel flex w-full max-w-md flex-col overflow-hidden max-h-[85vh]" role="dialog" aria-modal="true" aria-labelledby="publishBlockTitle">

      </div>

        <p id="publishBlockMessage" class="m-0 text-sm leading-relaxed whitespace-pre-line text-[rgba(0,0,0,0.65)]"></p>
      </div>
      <div class="ui-dialog-footer flex-shrink-0">
        <button type="button" id="publishBlockOk" class="ui-dialog-btn ui-dialog-btn--primary">知道了</button>
      </div>

  <script>
    (function() {
      var STORAGE_KEY = 'kiosk_themes';
      var currentPage = 1;
      var pageSize = 20;
      var lastFilteredTotal = 0;
      var pendingDeleteThemeId = null;
      var listHydrateBlobUrls = [];
      var previewOpenBlobUrls = [];

      function revokeListHydrateBlobUrls() {
        listHydrateBlobUrls.forEach(function(u) {
          try { URL.revokeObjectURL(u); } catch (e) { /* ignore */ }
        });
        listHydrateBlobUrls = [];
      }

      function hydrateThemeListMedia(list) {
        revokeListHydrateBlobUrls();
        var idb = window.KioskThemeMediaIdb;
        if (!idb || !idb.supported()) return Promise.resolve();
        var tasks = [];
        list.forEach(function(theme) {
          [theme.portraitImages, theme.landscapeImages].forEach(function(arr) {
            if (!arr) return;
            arr.forEach(function(m) {
              if (typeof m === 'object' && m.type === 'video' && m.mediaRef) {
                delete m._displaySrc;
                tasks.push(
                  idb.get(m.mediaRef).then(function(blob) {
                    if (blob) {
                      var u = URL.createObjectURL(blob);
                      listHydrateBlobUrls.push(u);
                      m._displaySrc = u;
                    }
                  })
                );
              }
            });
          });
        });
        return Promise.all(tasks);
      }

      function revokePreviewOpenBlobUrls() {
        previewOpenBlobUrls.forEach(function(u) {
          try { URL.revokeObjectURL(u); } catch (e) { /* ignore */ }
        });
        previewOpenBlobUrls = [];
      }

      function hydrateThemeForPreview(theme) {
        revokePreviewOpenBlobUrls();
        var idb = window.KioskThemeMediaIdb;
        if (!idb || !idb.supported()) return Promise.resolve();
        var tasks = [];
        function scan(arr) {
          if (!arr) return;
          arr.forEach(function(m) {
            if (typeof m === 'object' && m.type === 'video' && m.mediaRef) {
              delete m._displaySrc;
              tasks.push(
                idb.get(m.mediaRef).then(function(blob) {
                  if (blob) {
                    var u = URL.createObjectURL(blob);
                    previewOpenBlobUrls.push(u);
                    m._displaySrc = u;
                  }
                })
              );
            }
          });
        }
        scan(theme.portraitImages);
        scan(theme.landscapeImages);
        return Promise.all(tasks);
      }

      function collectVideoMediaRefs(theme) {
        var refs = [];
        function scan(arr) {
          if (!arr) return;
          arr.forEach(function(m) {
            if (m && typeof m === 'object' && m.type === 'video' && m.mediaRef) refs.push(m.mediaRef);
          });
        }
        scan(theme.portraitImages);
        scan(theme.landscapeImages);
        return refs;
      }

      var deleteConfirmModal = document.getElementById('deleteConfirmModal');
      var deleteConfirmThemeName = document.getElementById('deleteConfirmThemeName');
      var deleteConfirmCancel = document.getElementById('deleteConfirmCancel');
      var deleteConfirmOk = document.getElementById('deleteConfirmOk');
      var publishBlockModal = document.getElementById('publishBlockModal');
      var publishBlockMessage = document.getElementById('publishBlockMessage');
      var publishBlockOk = document.getElementById('publishBlockOk');

      function openDeleteConfirmModal() {
        if (!deleteConfirmModal) return;
        deleteConfirmModal.classList.remove('hidden');
        deleteConfirmModal.classList.add('flex');
        deleteConfirmModal.setAttribute('aria-hidden', 'false');
        if (deleteConfirmOk) deleteConfirmOk.focus();
      }

      function closeDeleteConfirmModal() {
        pendingDeleteThemeId = null;
        if (!deleteConfirmModal) return;
        deleteConfirmModal.classList.add('hidden');
        deleteConfirmModal.classList.remove('flex');
        deleteConfirmModal.setAttribute('aria-hidden', 'true');
      }

      function openPublishBlockModal(message) {
        if (publishBlockMessage) publishBlockMessage.textContent = message || '';
        if (!publishBlockModal) return;
        publishBlockModal.classList.remove('hidden');
        publishBlockModal.classList.add('flex');
        publishBlockModal.setAttribute('aria-hidden', 'false');
        if (publishBlockOk) publishBlockOk.focus();
      }

      function closePublishBlockModal() {
        if (!publishBlockModal) return;
        publishBlockModal.classList.add('hidden');
        publishBlockModal.classList.remove('flex');
        publishBlockModal.setAttribute('aria-hidden', 'true');
      }

      function executeDeleteTheme() {
        if (!pendingDeleteThemeId) return;
        var id = pendingDeleteThemeId;
        var all = getThemes();
        var doomed = all.find(function(t) { return t.id === id; });
        var refs = doomed && window.KioskThemeMediaIdb && KioskThemeMediaIdb.supported() ? collectVideoMediaRefs(doomed) : [];
        function applyDelete() {
          cancelAllChannelDisplayOpTimersForTheme(id);
          var list = all.filter(function(t) { return t.id !== id; });
          saveThemes(list);
          closeDeleteConfirmModal();
          render();
        }
        if (refs.length) {
          Promise.all(refs.map(function(r) { return KioskThemeMediaIdb.del(r).catch(function() {}); })).then(applyDelete);
        } else {
          applyDelete();
        }
      }

      function getThemes() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          var list = raw ? JSON.parse(raw) : [];
          var defaultIds = { 'demo1': true, 'demo2': true };
          var filtered = list.filter(function(t) { return !defaultIds[t.id]; });
          if (filtered.length !== list.length) {
            saveThemes(filtered);
            list = filtered;
          }
          return list;
        } catch (e) {
          return [];
        }
      }

      function saveThemes(list) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
      }

      function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function hideAllDropdownMenus() {
        document.querySelectorAll('.dropdown-menu').forEach(function(m) { m.classList.add('hidden'); });
        var fst = document.getElementById('filterShelfStatusTrigger');
        if (fst) fst.setAttribute('aria-expanded', 'false');
        var sst = document.getElementById('storesEffectStatusTrigger');
        if (sst) sst.setAttribute('aria-expanded', 'false');
      }

      function setupFilterShelfStatusDropdown() {
        var selectEl = document.getElementById('filterShelfStatus');
        var trigger = document.getElementById('filterShelfStatusTrigger');
        var label = document.getElementById('filterShelfStatusLabel');
        var menu = document.getElementById('filterShelfStatusMenu');
        if (!selectEl || !trigger || !label || !menu) return;

        var LABELS = { '': '全部', '待上架': '待上架', '已上架': '已上架', '已下架': '已下架' };

        function closeMenu() {
          menu.classList.add('hidden');
          trigger.setAttribute('aria-expanded', 'false');
        }

        function syncFromSelect() {
          var v = selectEl.value;
          label.textContent = Object.prototype.hasOwnProperty.call(LABELS, v) ? LABELS[v] : (v || '全部');
          menu.querySelectorAll('[role="option"]').forEach(function(opt) {
            opt.setAttribute('aria-selected', opt.getAttribute('data-value') === v ? 'true' : 'false');
          });
        }

        syncFromSelect();

        trigger.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          var willOpen = menu.classList.contains('hidden');
          hideAllDropdownMenus();
          if (willOpen) {
            menu.classList.remove('hidden');
            trigger.setAttribute('aria-expanded', 'true');
          } else {
            closeMenu();
          }
        });

        menu.addEventListener('click', function(e) {
          var btn = e.target.closest('[role="option"]');
          if (!btn || !btn.hasAttribute('data-value')) return;
          e.preventDefault();
          e.stopPropagation();
          selectEl.value = btn.getAttribute('data-value');
          syncFromSelect();
          closeMenu();
          selectEl.dispatchEvent(new Event('change', { bubbles: true }));
        });

        document.addEventListener('keydown', function(e) {
          if (menu.classList.contains('hidden')) return;
          if (e.key === 'Escape') {
            e.preventDefault();
            closeMenu();
          }
        });

        window.__syncFilterShelfStatusDropdown = syncFromSelect;
      }

      function setupStoresEffectStatusDropdown() {
        var selectEl = document.getElementById('storesEffectStatusFilter');
        var trigger = document.getElementById('storesEffectStatusTrigger');
        var label = document.getElementById('storesEffectStatusFilterLabel');
        var menu = document.getElementById('storesEffectStatusFilterMenu');
        if (!selectEl || !trigger || !label || !menu) return;

        var LABELS = { '': '全部', '待生效': '待生效', '生效中': '生效中', '已失效': '已失效' };

        function closeMenu() {
          menu.classList.add('hidden');
          trigger.setAttribute('aria-expanded', 'false');
        }

        function syncFromSelect() {
          var v = selectEl.value;
          label.textContent = Object.prototype.hasOwnProperty.call(LABELS, v) ? LABELS[v] : (v || '全部');
          menu.querySelectorAll('[role="option"]').forEach(function(opt) {
            opt.setAttribute('aria-selected', opt.getAttribute('data-value') === v ? 'true' : 'false');
          });
        }

        trigger.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          var willOpen = menu.classList.contains('hidden');
          hideAllDropdownMenus();
          if (willOpen) {
            menu.classList.remove('hidden');
            trigger.setAttribute('aria-expanded', 'true');
          } else {
            closeMenu();
          }
        });

        menu.addEventListener('click', function(e) {
          var btn = e.target.closest('[role="option"]');
          if (!btn || !btn.hasAttribute('data-value')) return;
          e.preventDefault();
          e.stopPropagation();
          selectEl.value = btn.getAttribute('data-value');
          syncFromSelect();
          closeMenu();
          selectEl.dispatchEvent(new Event('change', { bubbles: true }));
        });

        window.__syncStoresEffectStatusDropdown = syncFromSelect;
      }

      /** 列表/预览中判断是否为视频素材（与新建/编辑页写入的 { type:'video', dataUrl } 一致） */
      function isPreviewVideoMedia(item) {
        if (!item) return false;
        if (typeof item === 'object' && item.type === 'video') return true;
        var u = typeof item === 'string' ? item : (item.dataUrl || '');
        return typeof u === 'string' && u.indexOf('data:video') === 0;
      }

      function previewMediaSrc(item) {
        if (!item) return '';
        if (typeof item === 'object' && item._displaySrc) return item._displaySrc;
        return typeof item === 'string' ? item : (item.dataUrl || '');
      }

      function channelChipLabel(name) {
        if (name == null || name === '') return '—';
        var s = String(name).trim();
        var map = { eMenu: 'E-Menu', EMenu: 'E-Menu', Kiosk: 'Kiosk', CDS: 'CDS', OO: 'Online Order', SDI: 'Self Dine In' };
        return map[s] || s;
      }

      function buildChannelTagsHtml(theme) {
        var arr = theme.distributeChannels;
        if (!arr || !arr.length) return '';
        return '<div class="mt-auto flex flex-wrap gap-1 pt-1">' + arr.map(function(ch) {
          return '<span class="inline-flex items-center rounded-lg bg-black/[0.04] px-2 py-px text-xs leading-5 text-[rgba(0,0,0,0.65)]">' + escapeHtml(channelChipLabel(ch)) + '</span>';
        }).join('') + '</div>';
      }

      function collectMediaPairs(theme) {
        var out = [];
        (theme.portraitImages || []).forEach(function(m, i) { out.push({ m: m, type: 'portrait', index: i }); });
        (theme.landscapeImages || []).forEach(function(m, i) { out.push({ m: m, type: 'landscape', index: i }); });
        return out;
      }

      function thumbCellHtml(item, themeId) {
        var src = previewMediaSrc(item.m);
        var safeSrc = escapeHtml(src);
        var attrs = 'data-theme-id="' + escapeHtml(themeId) + '" data-img-type="' + item.type + '" data-img-index="' + item.index + '"';
        var innerCls = 'preview-thumb absolute inset-0 h-full w-full cursor-zoom-in rounded object-cover object-center transition-opacity duration-200 hover:opacity-95';
        var wrapOpen = '<div class="relative min-h-0 min-w-0 flex-1 overflow-hidden rounded-lg bg-white p-0.5 ring-0 transition-shadow duration-200 hover:shadow-[0_0_0_1px_rgba(22,119,255,0.35)]">';
        if (isPreviewVideoMedia(item.m)) {
          return wrapOpen + '<video src="' + safeSrc + '" title="点击查看预览" muted playsinline preload="metadata" draggable="false" ' + attrs + ' class="' + innerCls + '"></video></div>';
        }
        return wrapOpen + '<img src="' + safeSrc + '" alt="" title="点击查看大图" ' + attrs + ' class="' + innerCls + '" /></div>';
      }

      function renderThumbStage(theme) {
        var tid = theme.id;
        var items = collectMediaPairs(theme);
        if (!items.length) {
          return '<div class="flex h-[136px] w-[136px] shrink-0 items-center justify-center overflow-hidden rounded-xl bg-black/[0.06] p-2 text-xs text-[rgba(0,0,0,0.25)]">—</div>';
        }
        var outer = 'group flex h-[136px] w-[136px] shrink-0 gap-1 overflow-hidden rounded-xl bg-black/[0.06] p-2 transition-shadow duration-200 hover:shadow-[0_2px_8px_rgba(0,0,0,0.08)]';

          var metaRow =

              metaDivider() +

                '<p class="whitespace-nowrap text-sm leading-[22px] text-[rgba(0,0,0,0.88)]">' + escapeHtml(effectStr) + '</p></div>' +

          return '<div class="theme-list-card screensaver-card flex items-center gap-8 px-8 py-6" data-id="' + escapeHtml(t.id) + '">' +

              '<h3 class="text-xl font-semibold leading-7 text-[rgba(0,0,0,0.88)]">' + escapeHtml(t.name) + '</h3>' +

              '<div class="dropdown-menu theme-list-dropdown-menu ui-action-dropdown absolute right-0 top-[calc(100%+8px)] z-20 hidden bg-white">' +

        container.innerHTML = html;

        container.querySelectorAll('.more-btn').forEach(function(btn) {

        if (window.KioskThemeMediaIdb && KioskThemeMediaIdb.supported()) {

        } else {

      }

      var previewModal = document.getElementById('imagePreviewModal');
      var previewImage = document.getElementById('previewImage');
      var previewVideo = document.getElementById('previewVideo');
      var previewThemeTitleEl = document.getElementById('previewThemeTitle');
      var previewSlideDetailEl = document.getElementById('previewSlideDetail');
      var previewToolbarFractionEl = document.getElementById('previewToolbarFraction');
      var previewZoomTargetEl = document.getElementById('previewZoomTarget');
      var previewZoomInBtn = document.getElementById('previewZoomIn');
      var previewZoomOutBtn = document.getElementById('previewZoomOut');
      var previewTabPortrait = document.getElementById('previewTabPortrait');
      var previewTabLandscape = document.getElementById('previewTabLandscape');
      var previewOrientationSwitch = document.getElementById('previewOrientationSwitch');
      var previewPrev = document.getElementById('previewPrev');
      var previewNext = document.getElementById('previewNext');
      var previewClose = document.getElementById('previewClose');
      var currentPreviewSlides = [];
      var currentIndex = 0;
      var previewScale = 1;
      var previewPanX = 0;
      var previewPanY = 0;
      var previewPanCandidate = false;
      var previewPanActive = false;
      var previewPanPointerId = null;
      var previewPanLastX = 0;
      var previewPanLastY = 0;
      var previewPanStartX = 0;
      var previewPanStartY = 0;
      var previewAspectBoxEl = document.getElementById('previewAspectBox');

      var previewSegBase = 'preview-orient-tab inline-flex h-11 shrink-0 items-center justify-center gap-1 rounded-xl px-5 text-base transition-colors ';
      var previewSegActive = 'bg-white font-medium text-[rgba(0,0,0,0.88)] shadow-[0_1px_2px_rgba(0,0,0,0.03),0_1px_6px_-1px_rgba(0,0,0,0.02),0_2px_4px_rgba(0,0,0,0.02)]';
      var previewSegInactive = 'bg-transparent font-normal text-[rgba(0,0,0,0.65)] hover:text-[rgba(0,0,0,0.88)]';

      /** 仅当主题同时有竖版与横版素材时展示 Tab，用于快捷切换版式 */
      function previewShowsOrientationTabs() {
        return previewHasPortraitImages() && previewHasLandscapeImages();
      }

      function updatePreviewOrientationTabs() {
        if (!previewTabPortrait || !previewTabLandscape || !currentPreviewSlides.length) return;
        if (!previewShowsOrientationTabs()) return;
        var hasPortrait = previewHasPortraitImages();
        var hasLandscape = previewHasLandscapeImages();
        var onPortrait = previewActiveSegment === 'portrait';
        previewTabPortrait.disabled = !hasPortrait;
        previewTabLandscape.disabled = !hasLandscape;
        var disP = previewTabPortrait.disabled ? 'opacity-40 cursor-not-allowed pointer-events-none ' : '';
        var disL = previewTabLandscape.disabled ? 'opacity-40 cursor-not-allowed pointer-events-none ' : '';
        previewTabPortrait.className = previewSegBase + disP + (hasPortrait && onPortrait ? previewSegActive : previewSegInactive);
        previewTabLandscape.className = previewSegBase + disL + (hasLandscape && !onPortrait ? previewSegActive : previewSegInactive);
        previewTabPortrait.setAttribute('aria-selected', hasPortrait && onPortrait ? 'true' : 'false');
        previewTabLandscape.setAttribute('aria-selected', hasLandscape && !onPortrait ? 'true' : 'false');
      }

      function teardownPreviewPanListeners() {
        if (previewPanActive && previewAspectBoxEl && previewPanPointerId != null) {
          try {
            previewAspectBoxEl.releasePointerCapture(previewPanPointerId);
          } catch (err) { /* ignore */ }
        }
        document.removeEventListener('pointermove', onPreviewPanGlobalMove);
        document.removeEventListener('pointerup', onPreviewPanGlobalUp);
        document.removeEventListener('pointercancel', onPreviewPanGlobalUp);
        previewPanCandidate = false;
        previewPanActive = false;
        previewPanPointerId = null;
        if (previewAspectBoxEl) previewAspectBoxEl.classList.remove('preview-pan-dragging');
        if (previewZoomTargetEl) previewZoomTargetEl.classList.remove('preview-pan-dragging');
      }

      function clampPreviewPanIntoViewport() {
        if (!previewZoomTargetEl) return;
        var stage = previewAspectBoxEl || document.getElementById('previewAspectBox');
        if (!stage) return;
        var sRect = stage.getBoundingClientRect();
        for (var iter = 0; iter < 10; iter++) {
          previewZoomTargetEl.style.transform = 'translate(' + previewPanX + 'px,' + previewPanY + 'px) scale(' + previewScale + ')';
          var zRect = previewZoomTargetEl.getBoundingClientRect();
          var fx = 0;
          var fy = 0;
          if (zRect.width >= sRect.width - 0.5) {
            if (zRect.left > sRect.left + 0.5) fx = sRect.left - zRect.left;
            else if (zRect.right < sRect.right - 0.5) fx = sRect.right - zRect.right;
          } else {
            fx = (sRect.left + sRect.width / 2) - (zRect.left + zRect.width / 2);
          }
          if (zRect.height >= sRect.height - 0.5) {
            if (zRect.top > sRect.top + 0.5) fy = sRect.top - zRect.top;
            else if (zRect.bottom < sRect.bottom - 0.5) fy = sRect.bottom - zRect.bottom;
          } else {
            fy = (sRect.top + sRect.height / 2) - (zRect.top + zRect.height / 2);
          }
          if (Math.abs(fx) < 0.15 && Math.abs(fy) < 0.15) break;
          previewPanX += fx;
          previewPanY += fy;
        }
        previewZoomTargetEl.style.transform = 'translate(' + previewPanX + 'px,' + previewPanY + 'px) scale(' + previewScale + ')';
      }

      function applyPreviewZoom() {
        if (previewScale <= 1) {
          previewPanX = 0;
          previewPanY = 0;
          teardownPreviewPanListeners();
        }
        clampPreviewPanIntoViewport();
        if (previewAspectBoxEl) {
          previewAspectBoxEl.setAttribute('data-preview-pan-scale', String(previewScale));
        }
        if (previewZoomInBtn) {
          previewZoomInBtn.disabled = previewScale >= 3;
          previewZoomInBtn.classList.toggle('opacity-40', previewScale >= 3);
          previewZoomInBtn.classList.toggle('cursor-not-allowed', previewScale >= 3);
        }
        if (previewZoomOutBtn) {
          previewZoomOutBtn.disabled = previewScale <= 0.5;
          previewZoomOutBtn.classList.toggle('opacity-40', previewScale <= 0.5);
          previewZoomOutBtn.classList.toggle('cursor-not-allowed', previewScale <= 0.5);
        }
      }

      /** 仅某一版式下的素材列表（竖版 / 横版分段预览，与产品说明一致） */
      function buildSegmentSlides(theme, segment) {
        var imgs = segment === 'portrait' ? (theme.portraitImages || []) : (theme.landscapeImages || []);
        var orientationLabel = segment === 'portrait' ? '竖版' : '横版';
        var len = imgs.length;
        return imgs.map(function(img, i) {
          return {
            src: previewMediaSrc(img),
            kind: isPreviewVideoMedia(img) ? 'video' : 'image',
            orientation: orientationLabel,
            groupIndex: i + 1,
            groupCount: len
          };
        });
      }

      var previewThemeRef = null;
      var previewActiveSegment = 'portrait';

      function previewHasPortraitImages() {
        return !!(previewThemeRef && (previewThemeRef.portraitImages || []).length);
      }
      function previewHasLandscapeImages() {
        return !!(previewThemeRef && (previewThemeRef.landscapeImages || []).length);
      }

      function openImagePreview(themeId, imgType, imgIndex) {
        var themes = getThemes();
        var theme = themes.find(function(t) { return t.id === themeId; });
        if (!theme) return;
        function openWithTheme(t) {
          var seg = imgType === 'landscape' ? 'landscape' : 'portrait';
          var slides = buildSegmentSlides(t, seg);
          if (!slides.length) return;
          previewThemeRef = t;
          previewActiveSegment = seg;
          currentPreviewSlides = slides;
          currentIndex = Math.min(Math.max(0, imgIndex), slides.length - 1);
          previewScale = 1;
          applyPreviewZoom();
          if (previewThemeTitleEl) previewThemeTitleEl.textContent = t.name || '未命名主题';
          updatePreview();
          previewModal.classList.remove('hidden');
          previewModal.classList.add('flex');
        }
        hydrateThemeForPreview(theme).then(function() {
          openWithTheme(theme);
        });
      }

      function stopPreviewVideo() {
        if (!previewVideo) return;
        previewVideo.pause();
        previewVideo.removeAttribute('src');
        try {
          previewVideo.load();
        } catch (err) { /* ignore */ }
      }

      function updatePreview() {
        if (!currentPreviewSlides.length) return;
        if (typeof updatePreview._idx === 'number' && updatePreview._idx !== currentIndex) {
          previewScale = 1;
          applyPreviewZoom();
        }
        updatePreview._idx = currentIndex;
        var slide = currentPreviewSlides[currentIndex];
        var total = currentPreviewSlides.length;
        var unit = slide.kind === 'video' ? '段' : '张';
        var sub = slide.groupCount > 0
          ? slide.orientation + ' 第 ' + slide.groupIndex + '/' + slide.groupCount + ' ' + unit
          : slide.orientation;
        if (previewToolbarFractionEl) {
          previewToolbarFractionEl.textContent = (currentIndex + 1) + ' / ' + total;
        }
        if (previewSlideDetailEl) {
          var showDetail = total > 1 || (slide.groupCount && slide.groupCount > 1);
          previewSlideDetailEl.textContent = showDetail ? sub : '';
          previewSlideDetailEl.classList.toggle('hidden', !showDetail);
        }
        var multi = currentPreviewSlides.length > 1;
        if (previewPrev) {
          previewPrev.disabled = !multi;
          previewPrev.classList.toggle('opacity-40', !multi);
          previewPrev.classList.toggle('cursor-not-allowed', !multi);
        }
        if (previewNext) {
          previewNext.disabled = !multi;
          previewNext.classList.toggle('opacity-40', !multi);
          previewNext.classList.toggle('cursor-not-allowed', !multi);
        }
        var showOrientTabs = previewShowsOrientationTabs();
        if (previewOrientationSwitch) {
          if (showOrientTabs) {
            previewOrientationSwitch.classList.remove('hidden');
            previewOrientationSwitch.classList.add('flex');
            previewOrientationSwitch.setAttribute('aria-hidden', 'false');
          } else {
            previewOrientationSwitch.classList.add('hidden');
            previewOrientationSwitch.classList.remove('flex');
            previewOrientationSwitch.setAttribute('aria-hidden', 'true');
          }
        }
        if (slide.kind === 'video' && previewVideo) {
          previewImage.src = '';
          previewImage.classList.add('hidden');
          previewVideo.classList.remove('hidden');
          previewVideo.src = slide.src || '';
          previewVideo.load();
          var playAttempt = previewVideo.play();
          if (playAttempt && typeof playAttempt.catch === 'function') {
            playAttempt.catch(function() { /* 浏览器可能要求用户再点播放 */ });
          }
        } else {
          stopPreviewVideo();
          previewVideo.classList.add('hidden');
          previewImage.classList.remove('hidden');
          previewImage.src = slide.src || '';
        }
        updatePreviewOrientationTabs();
        syncPreviewFixedHeightLayout();
      }

      /** 任意横/竖素材：预览区外层高度固定为「最大可用高度」min(88vh,800px)，避免切换图片时整体跳动 */
      function syncPreviewFixedHeightLayout() {
        var drawer = document.getElementById('previewDrawer');
        if (!drawer) return;
        if (currentPreviewSlides.length > 0) {
          drawer.setAttribute('data-preview-fixed-h', '1');
        } else {
          drawer.removeAttribute('data-preview-fixed-h');
        }
      }

      function closePreview() {
        previewModal.classList.add('hidden');
        previewModal.classList.remove('flex');
        stopPreviewVideo();
        if (previewVideo) previewVideo.classList.add('hidden');
        previewImage.src = '';
        previewImage.classList.remove('hidden');
        revokePreviewOpenBlobUrls();
        currentPreviewSlides = [];
        currentIndex = 0;
        previewThemeRef = null;
        previewActiveSegment = 'portrait';
        previewScale = 1;
        previewPanX = 0;
        previewPanY = 0;
        teardownPreviewPanListeners();
        if (previewZoomTargetEl) previewZoomTargetEl.style.transform = 'translate(0px, 0px) scale(1)';
        if (previewAspectBoxEl) previewAspectBoxEl.setAttribute('data-preview-pan-scale', '1');
        applyPreviewZoom();
        if (previewThemeTitleEl) previewThemeTitleEl.textContent = '--';
        if (previewSlideDetailEl) {
          previewSlideDetailEl.textContent = '';
          previewSlideDetailEl.classList.add('hidden');
        }
        if (previewOrientationSwitch) {
          previewOrientationSwitch.classList.add('hidden');
          previewOrientationSwitch.classList.remove('flex');
          previewOrientationSwitch.removeAttribute('aria-hidden');
        }
        var previewDrawerLayout = document.getElementById('previewDrawer');
        if (previewDrawerLayout) previewDrawerLayout.removeAttribute('data-preview-fixed-h');
        delete updatePreview._idx;
      }

      var previewBackdrop = document.getElementById('previewBackdrop');
      previewClose.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        closePreview();
      });
      if (previewBackdrop) {
        previewBackdrop.addEventListener('click', function(e) {
          e.preventDefault();
          closePreview();
        });
      }

      function onPreviewPanGlobalMove(e) {
        if (!previewPanCandidate || e.pointerId !== previewPanPointerId) return;
        if (!previewPanActive) {
          if (Math.abs(e.clientX - previewPanStartX) + Math.abs(e.clientY - previewPanStartY) < 6) return;
          previewPanActive = true;
          if (previewAspectBoxEl) {
            try {
              previewAspectBoxEl.setPointerCapture(e.pointerId);
            } catch (err) { /* ignore */ }
            previewAspectBoxEl.classList.add('preview-pan-dragging');
          }
          if (previewZoomTargetEl) previewZoomTargetEl.classList.add('preview-pan-dragging');
        }
        previewPanX += e.clientX - previewPanLastX;
        previewPanY += e.clientY - previewPanLastY;
        previewPanLastX = e.clientX;
        previewPanLastY = e.clientY;
        clampPreviewPanIntoViewport();
      }

      function onPreviewPanGlobalUp(e) {
        if (!previewPanCandidate || e.pointerId !== previewPanPointerId) return;
        teardownPreviewPanListeners();
      }

      if (previewAspectBoxEl) {
        previewAspectBoxEl.addEventListener('pointerdown', function(e) {
          if (previewModal.classList.contains('hidden')) return;
          if (previewScale <= 1) return;
          if (e.pointerType === 'mouse' && e.button !== 0) return;
          previewPanCandidate = true;
          previewPanPointerId = e.pointerId;
          previewPanLastX = previewPanStartX = e.clientX;
          previewPanLastY = previewPanStartY = e.clientY;
          document.addEventListener('pointermove', onPreviewPanGlobalMove);
          document.addEventListener('pointerup', onPreviewPanGlobalUp);
          document.addEventListener('pointercancel', onPreviewPanGlobalUp);
        });
        previewAspectBoxEl.addEventListener('wheel', function(e) {
          if (previewModal.classList.contains('hidden')) return;
          if (previewScale > 1) e.preventDefault();
        }, { passive: false });
      }

      if (previewTabPortrait) {
        previewTabPortrait.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          if (!previewThemeRef || !previewHasPortraitImages()) return;
          previewActiveSegment = 'portrait';
          currentPreviewSlides = buildSegmentSlides(previewThemeRef, 'portrait');
          currentIndex = 0;
          previewScale = 1;
          applyPreviewZoom();
          updatePreview();
        });
      }
      if (previewTabLandscape) {
        previewTabLandscape.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          if (!previewThemeRef || !previewHasLandscapeImages()) return;
          previewActiveSegment = 'landscape';
          currentPreviewSlides = buildSegmentSlides(previewThemeRef, 'landscape');
          currentIndex = 0;
          previewScale = 1;
          applyPreviewZoom();
          updatePreview();
        });
      }
      previewPrev.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        if (currentPreviewSlides.length <= 1) return;
        currentIndex = (currentIndex - 1 + currentPreviewSlides.length) % currentPreviewSlides.length;
        updatePreview();
      });
      previewNext.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        if (currentPreviewSlides.length <= 1) return;
        currentIndex = (currentIndex + 1) % currentPreviewSlides.length;
        updatePreview();
      });
      if (previewZoomInBtn) {
        previewZoomInBtn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          if (previewScale >= 3) return;
          previewScale = Math.min(3, previewScale + 0.25);
          applyPreviewZoom();
        });
      }
      if (previewZoomOutBtn) {
        previewZoomOutBtn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          if (previewScale <= 0.5) return;
          previewScale = Math.max(0.5, previewScale - 0.25);
          applyPreviewZoom();
        });
      }
      document.addEventListener('keydown', function(e) {
        if (previewModal.classList.contains('hidden')) return;
        if (e.key === 'Escape') {
          e.preventDefault();
          closePreview();
          return;
        }
        if (e.key === 'ArrowLeft' && currentPreviewSlides.length > 1) {
          e.preventDefault();
          currentIndex = (currentIndex - 1 + currentPreviewSlides.length) % currentPreviewSlides.length;
          updatePreview();
        }
        if (e.key === 'ArrowRight' && currentPreviewSlides.length > 1) {
          e.preventDefault();
          currentIndex = (currentIndex + 1) % currentPreviewSlides.length;
          updatePreview();
        }
        if ((e.key === '+' || e.key === '=') && !e.ctrlKey && !e.metaKey) {
          e.preventDefault();
          if (previewScale < 3) {
            previewScale = Math.min(3, previewScale + 0.25);
            applyPreviewZoom();
          }
        }
        if (e.key === '-' && !e.ctrlKey && !e.metaKey) {
          e.preventDefault();
          if (previewScale > 0.5) {
            previewScale = Math.max(0.5, previewScale - 0.25);
            applyPreviewZoom();
          }
        }
      });

      document.addEventListener('click', function(e) {
        hideAllDropdownMenus();
        if (!e.target.closest('[data-store-batch-menu-root]')) {
          document.querySelectorAll('.store-batch-menu').forEach(function(m) { m.classList.add('hidden'); });
        }
      });

      var storesModal = document.getElementById('storesModal');
      var storesModalClose = document.getElementById('storesModalClose');
      var storesListContainer = document.getElementById('storesListContainer');
      var storesTotalEl = document.getElementById('storesTotal');
      var storesThemeEffectTimeEl = document.getElementById('storesThemeEffectTime');

      var currentModalThemeId = null;
      var storesMidSearchEl = document.getElementById('storesMidSearch');
      var storesEffectStatusFilterEl = document.getElementById('storesEffectStatusFilter');
      var storesFilterResetEl = document.getElementById('storesFilterReset');
      var storesFilteredHintEl = document.getElementById('storesFilteredHint');

      /**
       * 渠道「不展示 / 恢复展示」：云端 → Kiosk 执行 → Kiosk 回传执行结果 → 云端更新状态。
       * 产品：仅当云端收到 Kiosk 回传的「执行成功 / 执行失败」后，配置端才结束执行中或展示失败；
       * 若云端一直收不到回传，界面**一直执行中**（不因超时而自动判失败）。
       * 原型用确定性分支模拟：成功 / 设备执行失败（已同步云端）/ 长期无回传（仅演示）。
       */
      var channelDisplayOpTimers = {};

      function channelDisplayOpKey(themeId, mid, channelName) {
        return String(themeId) + '|' + String(mid || '') + '|' + String(channelName || '');
      }

      function cancelChannelDisplayOpTimer(key) {
        var t = channelDisplayOpTimers[key];
        if (!t) return;
        if (typeof t === 'object') {
          if (t.success != null) clearTimeout(t.success);
          if (t.execFail != null) clearTimeout(t.execFail);
          if (t.fail != null) clearTimeout(t.fail);
          if (t.ok != null) clearTimeout(t.ok);
        } else {
          clearTimeout(t);
        }
        delete channelDisplayOpTimers[key];
      }

      function cancelAllChannelDisplayOpTimersForTheme(themeId) {
        Object.keys(channelDisplayOpTimers).forEach(function(k) {
          if (k.indexOf(String(themeId) + '|') === 0) cancelChannelDisplayOpTimer(k);
        });
      }

      /** 与 startedAt 绑定，保证同一次 pending 在刷新后原型分支不变 */
      function channelDisplayDemoOutcome(themeId, mid, channelName, startedAt) {
        var s = String(themeId) + '\x1e' + String(mid) + '\x1e' + String(channelName) + '\x1e' + String(startedAt);
        var h = 0;
        for (var i = 0; i < s.length; i++) {
          h = ((h << 5) - h) + s.charCodeAt(i);
          h = h | 0;
        }
        var u = Math.abs(h) % 100;
        if (u < 40) return 'success';
        if (u < 68) return 'exec_fail';
        return 'stuck';
      }

      function findChannelCs(theme, mid, channelName) {
        if (!theme || !theme.distributedStores) return null;
        var store = theme.distributedStores.filter(function(s) { return String(s.mid) === String(mid); })[0];
        if (!store) return null;
        var cs = (store.channelStatuses || []).filter(function(c) { return String(c.channel || '') === String(channelName); })[0];
        if (!cs) return null;
        return { store: store, cs: cs };
      }

      function applyChannelDisplayOpSuccess(themeId, mid, channelName, action) {
        var themes = getThemes();
        var theme = themes.filter(function(t) { return t.id === themeId; })[0];
        var found = findChannelCs(theme, mid, channelName);
        if (!found) return;
        var store = found.store;
        var cs = found.cs;
        // 已弃用：渠道切换改为立即生效
        if (action === 'hide') {
          cs.shelfStatus = 'off_shelf';
        } else {
          delete cs.shelfStatus;
          if (store.shelfStatus === 'off_shelf') delete store.shelfStatus;
        }
        saveThemes(themes);
        if (storesModal && storesModal.classList.contains('flex') && currentModalThemeId === themeId) {
          renderStoresModalList();
        }
        render();
      }

      /** Kiosk 执行失败且执行结果已到达云端 → 配置端展示失败 */
      function applyChannelDisplayOpExecFailure(themeId, mid, channelName, action) {
        var themes = getThemes();
        var theme = themes.filter(function(t) { return t.id === themeId; })[0];
        var found = findChannelCs(theme, mid, channelName);
        if (!found) return;
        var cs = found.cs;
        if (!cs.displaySync || cs.displaySync.state !== 'pending' || cs.displaySync.action !== action) return;
        // 已弃用：不再展示执行失败/重试等中间态，渠道切换为立即生效
        delete cs.displaySync;
        saveThemes(themes);
        if (storesModal && storesModal.classList.contains('flex') && currentModalThemeId === themeId) {
          renderStoresModalList();
        }
        render();
      }

      /** 旧原型：计时器模拟设备回传（已弃用，渠道切换改为立即生效） */
      function armChannelDisplayOpTimers(themeId, mid, channelName, action) {
        var key = channelDisplayOpKey(themeId, mid, channelName);
        cancelChannelDisplayOpTimer(key);
        var themes = getThemes();
        var theme = themes.filter(function(t) { return t.id === themeId; })[0];
        var found = findChannelCs(theme, mid, channelName);
        if (!found || !found.cs.displaySync || found.cs.displaySync.state !== 'pending') return;
        var cs = found.cs;
        if (found.cs.displaySync.action !== action) return;
        if (typeof cs.displaySync.startedAt !== 'number') {
          cs.displaySync.startedAt = Date.now();
          saveThemes(themes);
        }
        var startedAt = cs.displaySync.startedAt;
        var outcome = channelDisplayDemoOutcome(themeId, mid, channelName, startedAt);
        var handles = {};
        if (outcome === 'stuck') {
          channelDisplayOpTimers[key] = handles;
          return;
        }
        if (outcome === 'success') {
          var d = 700 + Math.floor(Math.random() * 1800);
          handles.success = setTimeout(function() {
            cancelChannelDisplayOpTimer(key);
            applyChannelDisplayOpSuccess(themeId, mid, channelName, action);
          }, d);
        } else {
          var d2 = 800 + Math.floor(Math.random() * 1600);
          handles.execFail = setTimeout(function() {
            cancelChannelDisplayOpTimer(key);
            applyChannelDisplayOpExecFailure(themeId, mid, channelName, action);
          }, d2);
        }
        channelDisplayOpTimers[key] = handles;
      }

      /** 已弃用：不再存在 pending 中间态（渠道切换立即生效） */
      function resumePendingChannelDisplayOps(themeId) {
        return;
      }

      /** 渠道当前为「未展示」：仅依据 shelfStatus（立即生效，无中间态） */
      function channelIsOffShelf(store, cs) {
        if (!cs) return false;
        if (cs.shelfStatus === 'off_shelf') return true;
        if (store.shelfStatus === 'off_shelf') return true;
        return false;
      }

      /** 渠道当前为「展示中」（可点不展示） */
      function channelIsOnShelf(store, cs) {
        if (!cs) return false;
        return !channelIsOffShelf(store, cs);
      }

      function renderMiniSwitchControl(on, opts) {
        opts = opts || {};
        var bg = on ? 'bg-[#1677ff]' : 'bg-[rgba(0,0,0,0.25)]';
        var justify = on ? ' justify-end' : '';
        var pend = opts.pending ? ' opacity-60' : '';
        var dis = opts.disabled ? ' opacity-50' : '';
        return '<span class="pointer-events-none inline-flex h-4 w-7 shrink-0 items-center rounded-xl p-0.5 ' + bg + justify + pend + dis + '"><span class="block h-3 w-3 rounded-full bg-white shadow-[0_2px_4px_rgba(0,35,11,0.2)]"></span></span>';
      }

      function storeEffectStatusBadgeHtml(theme, store) {
        var storeEffectStatus = getStoreEffectStatus(theme, store);
        if (!storeEffectStatus) {
          return '<span class="text-sm text-[rgba(0,0,0,0.45)]">\u2014</span>';
        }

        if (t === '\u751f\u6548\u4e2d') {
          return '<span class="inline-flex items-center rounded-lg border border-[#91caff] bg-[#e6f4ff] px-2 py-px text-xs font-normal leading-5 text-primary">' + escapeHtml(t) + '</span>';
        }
        if (t === '\u5f85\u751f\u6548') {
          return '<span class="inline-flex items-center rounded-lg border border-[#ffd591] bg-[#fff7e6] px-2 py-px text-xs font-normal leading-5 text-[#fa8c16]">' + escapeHtml(t) + '</span>';
        }
        return '<span class="inline-flex items-center rounded-lg border border-[#d9d9d9] bg-[rgba(0,0,0,0.04)] px-2 py-px text-xs font-normal leading-5 text-[rgba(0,0,0,0.88)]">' + escapeHtml(t) + '</span>';
      }

      function renderOneChannelCell(store, theme, cs, operable) {
        var midAttr = escapeHtml(String(store.mid || ''));
        var chLabel = cs.channel != null && cs.channel !== '' ? String(cs.channel) : '\u2014';
        var chNameAttr = escapeHtml(chLabel);
        var displayName = escapeHtml(channelChipLabel(chLabel));
        var on = channelIsOnShelf(store, cs);
        var cellBg = on ? 'bg-[#e6f4ff]' : 'bg-[rgba(0,0,0,0.06)]';
        var statColor = on ? 'text-primary' : 'text-[rgba(0,0,0,0.65)]';
        var statText = on ? '\u5c55\u793a\u4e2d' : '\u672a\u5c55\u793a';
        var switchOpts = { pending: false, disabled: false };
        var action = on ? 'off_shelf' : 'on_shelf';
        var rightBlock =
          '<button type="button" data-channel-action="' + action + '" data-store-mid="' + midAttr + '" data-channel="' + chNameAttr + '" class="flex shrink-0 items-center gap-1 border-0 bg-transparent p-0 hover:opacity-90 focus:outline-none">' +
            '<span class="whitespace-nowrap text-sm leading-[22px] ' + statColor + '">' + statText + '</span>' +
            renderMiniSwitchControl(on, switchOpts) +
          '</button>';
        return '<div class="flex min-h-[48px] flex-col justify-center rounded-lg px-3 py-2 ' + cellBg + '">' +
          '<div class="flex min-w-0 items-center justify-between gap-2">' +
            '<p class="min-w-0 flex-1 truncate text-base font-medium leading-6 text-[rgba(0,0,0,0.88)]" title="' + chNameAttr + '">' + displayName + '</p>' +
            '<div class="flex min-w-0 flex-col items-end">' + rightBlock + '</div>' +
          '</div></div>';
      }

      function renderChannelGrid(store, theme) {
        var arr = store.channelStatuses;
        if (!arr || !arr.length) return '';
        var operable = isStoreDetailChannelUiOperable(theme, store);
        var cells = arr.map(function(cs) {
          return renderOneChannelCell(store, theme, cs, operable);
        });
        return '<div class="grid w-full grid-cols-1 gap-2 sm:grid-cols-2 min-[920px]:grid-cols-3">' + cells.join('') + '</div>';
      }

      function renderStoreBatchDropdown(store, theme) {
        if (!isStoreDetailChannelUiOperable(theme, store)) return '';
        var arr = store && Array.isArray(store.channelStatuses) ? store.channelStatuses : [];
        if (!arr.length) return '';
        var midAttr = escapeHtml(String(store.mid || ''));
        var offCount = arr.filter(function(cs) { return channelIsOffShelf(store, cs); }).length;
        var allOff = offCount === arr.length;
        var allOn = offCount === 0;
        var disOff = allOff ? ' disabled aria-disabled="true"' : '';
        var disOn = allOn ? ' disabled aria-disabled="true"' : '';
        var menuItems =
          '<button type="button" data-store-batch-action="all_on_shelf" data-store-mid="' + midAttr + '" class="ui-menu-item"' + disOn + '>全渠道展示</button>' +
          '<button type="button" data-store-batch-action="all_off_shelf" data-store-mid="' + midAttr + '" class="ui-menu-item"' + disOff + '>全渠道不展示</button>';
        return '<div class="relative shrink-0" data-store-batch-menu-root>' +
          '<button type="button" data-store-batch-toggle class="ui-batch-btn flex h-12 items-center gap-2 rounded-xl px-6 text-[18px] font-semibold shadow-[0_10px_24px_rgba(0,0,0,0.06)] focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-1">' +
          '<span>\u6279\u91cf</span>' +
          '<svg width="16" height="16" viewBox="0 0 1024 1024" fill="currentColor" class="shrink-0 opacity-80" aria-hidden="true"><path d="M884 256h-75c-5.1 0-9.9 2.5-12.6 6.5L512 654.2 227.9 262.6c-2.7-4-7.5-6.5-12.6-6.5h-75c-6.5 0-10.3 7.4-6.5 12.7l352.6 486.1c12.8 17.6 39 17.6 51.7 0l352.6-486.1c3.9-5.3.1-12.7-6.4-12.7z"/></svg></button>' +
          '<div class="store-batch-menu ui-batch-menu dropdown-menu theme-list-dropdown-menu ui-action-dropdown absolute right-0 top-[calc(100%+8px)] z-30 hidden bg-white">' + menuItems + '</div></div>';
      }

      function renderStoresModalList() {
        if (!currentModalThemeId || !storesListContainer) return;
        var themes = getThemes();
        var theme = themes.find(function(t) { return t.id === currentModalThemeId; });
        if (!theme || !theme.distributedStores) {
          storesListContainer.innerHTML = '';
          if (storesFilteredHintEl) storesFilteredHintEl.classList.add('hidden');
          return;
        }
        renderStoresEffectStatusFilter(theme);
        var stores = theme.distributedStores;
        var midQ = (storesMidSearchEl && storesMidSearchEl.value) ? storesMidSearchEl.value.trim().toLowerCase() : '';
        var effQ = (storesEffectStatusFilterEl && storesEffectStatusFilterEl.value) ? storesEffectStatusFilterEl.value : '';
        var filtered = stores.filter(function(s) {
          if (midQ) {
            var midStr = String(s.mid || '').toLowerCase();
            var nameStr = String(s.name || '').toLowerCase();
            if (midStr.indexOf(midQ) < 0 && nameStr.indexOf(midQ) < 0) return false;
          }
          if (effQ) {
            var storeStatus = getStoreEffectStatus(theme, s);
            if (!storeStatus || storeStatus.text !== effQ) return false;
          }
          return true;
        });
        var storeCardIcon = '<div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-[rgba(0,0,0,0.88)]" aria-hidden="true">' +
          '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-white">' +
          '<path d="M4 10V20H9V14H15V20H20V10L12 4L4 10Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>' +
          '<path d="M9 20V12.5H15V20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>' +
          '</svg></div>';
        storesListContainer.innerHTML = filtered.length
          ? filtered.map(function(store) {
              var channelBlock = renderChannelGrid(store, theme);
              var batchBlock = renderStoreBatchDropdown(store, theme);
              var tz = getStoreTimezone(store);
              var effectBadge = storeEffectStatusBadgeHtml(theme, store);
              var metaRow =
                '<span class="inline-flex items-start gap-1 text-sm leading-[22px] whitespace-nowrap">' +
                '<span class="shrink-0 text-[rgba(0,0,0,0.65)]">MID：</span>' +
                '<span class="text-right text-[rgba(0,0,0,0.88)]">' + escapeHtml(String(store.mid != null ? store.mid : '')) + '</span></span>' +
                '<span class="flex shrink-0 items-center self-stretch py-1" aria-hidden="true"><span class="h-full min-h-[14px] w-px rounded-full bg-[#d9d9d9]"></span></span>' +
                '<span class="inline-flex items-start gap-1 text-sm leading-[22px] whitespace-nowrap">' +
                '<span class="shrink-0 text-[rgba(0,0,0,0.65)]">时区：</span>' +
                '<span class="text-right text-[rgba(0,0,0,0.88)]">' + escapeHtml(tz) + '</span></span>' +
                '<span class="flex shrink-0 items-center self-stretch py-1" aria-hidden="true"><span class="h-full min-h-[14px] w-px rounded-full bg-[#d9d9d9]"></span></span>' +
                '<span class="inline-flex flex-wrap items-center gap-1 text-sm leading-[22px]">' +
                '<span class="shrink-0 text-[rgba(0,0,0,0.65)]">门店生效状态：</span>' + effectBadge + '</span>';
              var channelSection = channelBlock
                ? '<div class="mt-6">' + channelBlock + '</div>'
                : '<div class="mt-6 rounded-lg border border-dashed border-[#d9d9d9] bg-[rgba(0,0,0,0.02)] px-4 py-8 text-center text-sm leading-[22px] text-[rgba(0,0,0,0.45)]">暂无渠道数据</div>';
              return '<article class="rounded-2xl border border-[#d9d9d9] bg-white p-4 shadow-[0_1px_2px_rgba(0,0,0,0.03)]">' +
                '<div class="flex gap-4">' +
                storeCardIcon +
                '<div class="min-w-0 flex-1">' +
                '<div class="flex flex-wrap items-start justify-between gap-3">' +
                '<div class="min-w-0 flex-1">' +
                '<h3 class="text-xl font-semibold leading-7 text-[rgba(0,0,0,0.88)]">' + escapeHtml(store.name || '') + '</h3>' +
                '<div class="mt-2 flex flex-wrap items-center gap-x-3 gap-y-1">' + metaRow + '</div>' +
                '</div>' + batchBlock +
                '</div>' +
                channelSection +
                '</div></div></article>';
            }).join('')
          : '<p class="py-8 px-2 text-center text-sm text-[rgba(0,0,0,0.45)]">无匹配门店，请调整门店名称或 MID</p>';
        if (storesFilteredHintEl) {
          if (filtered.length < stores.length || midQ || effQ) {
            storesFilteredHintEl.textContent = '当前显示 ' + filtered.length + ' / ' + stores.length + ' 家门店';
            storesFilteredHintEl.classList.remove('hidden');
          } else {
            storesFilteredHintEl.classList.add('hidden');
          }
        }
      }

      function openStoresModal(themeId) {
        var themes = getThemes();
        var theme = themes.find(function(t) { return t.id === themeId; });
        if (!theme || !theme.distributedStores) return;
        currentModalThemeId = themeId;
        hideAllDropdownMenus();
        if (storesMidSearchEl) storesMidSearchEl.value = '';
        if (storesEffectStatusFilterEl) storesEffectStatusFilterEl.value = '';
        var stores = theme.distributedStores;
        storesTotalEl.textContent = stores.length;
        if (storesThemeEffectTimeEl) {
          storesThemeEffectTimeEl.textContent = getThemeEffectDisplayText(theme);
        }
        document.querySelectorAll('.store-batch-menu').forEach(function(m) { m.classList.add('hidden'); });
        renderStoresModalList();
        if (theme && stores.some(function(s) { return isStoreDetailChannelUiOperable(theme, s); })) {
          resumePendingChannelDisplayOps(themeId);
        }
        storesModal.classList.remove('hidden');
        storesModal.classList.add('flex');
      }

      if (storesMidSearchEl) {
        storesMidSearchEl.addEventListener('input', function() {
          if (storesModal.classList.contains('flex')) renderStoresModalList();
        });
      }
      if (storesEffectStatusFilterEl) {
        storesEffectStatusFilterEl.addEventListener('change', function() {
          if (storesModal.classList.contains('flex')) renderStoresModalList();
        });
      }
      if (storesFilterResetEl) {
        storesFilterResetEl.addEventListener('click', function() {
          if (storesMidSearchEl) storesMidSearchEl.value = '';
          if (storesEffectStatusFilterEl) storesEffectStatusFilterEl.value = '';
          if (window.__syncStoresEffectStatusDropdown) window.__syncStoresEffectStatusDropdown();
          renderStoresModalList();
        });
      }

      function applyStoreBatchChannelAction(themeId, mid, action) {
        if (!themeId || !mid || (action !== 'hide' && action !== 'show')) return false;
        var themes = getThemes();
        var theme = themes.find(function(t) { return t.id === themeId; });
        if (!theme || !theme.distributedStores) return false;
        var store = theme.distributedStores.find(function(s) { return String(s.mid) === String(mid); });
        if (!store) return false;
        var arr = store.channelStatuses || [];
        if (!arr.length) return false;
        var hasValidChannel = false;
        arr.forEach(function(cs) {
          var channelName = cs && cs.channel != null ? String(cs.channel) : '';
          if (!channelName) return;
          hasValidChannel = true;
          if (action === 'hide') {
            cs.shelfStatus = 'off_shelf';
          } else {
            delete cs.shelfStatus;
            if (store.shelfStatus === 'off_shelf') delete store.shelfStatus;
          }
        });
        if (!hasValidChannel) return false;

        saveThemes(themes);
        return true;
      }

      storesListContainer.addEventListener('click', function(e) {
        if (!storesModal.classList.contains('flex')) return;
        var batchToggle = e.target.closest('[data-store-batch-toggle]');
        if (batchToggle) {
          e.preventDefault();
          e.stopPropagation(); // 防止 document.click 立刻把 dropdown-menu 全部隐藏
          var root = batchToggle.closest('[data-store-batch-menu-root]');
          var menu = root && root.querySelector('.store-batch-menu');
          if (!menu) return;
          var willOpen = menu.classList.contains('hidden');
          hideAllDropdownMenus();
          if (willOpen) menu.classList.remove('hidden');
          return;
        }
        var chBtn = e.target.closest('[data-channel-action]');
        if (chBtn) {
          e.stopPropagation();
          var chAction = chBtn.getAttribute('data-channel-action');
          var midCh = chBtn.getAttribute('data-store-mid');
          var chName = chBtn.getAttribute('data-channel');
          if (!midCh || !currentModalThemeId || chName == null || chName === '') return;
          var themesCh = getThemes();
          var themeCh = themesCh.find(function(t) { return t.id === currentModalThemeId; });
          if (!themeCh || !themeCh.distributedStores) return;
          var storeCh = themeCh.distributedStores.find(function(s) { return String(s.mid) === String(midCh); });
          if (!storeCh) return;
          var arrCh = storeCh.channelStatuses || [];
          var cs = arrCh.filter(function(c) { return String(c.channel || '') === String(chName); })[0];
          if (!cs) return;
          if (chAction === 'off_shelf') {
            if (!channelIsOnShelf(storeCh, cs)) return;
            cs.shelfStatus = 'off_shelf';
            saveThemes(themesCh);
            renderStoresModalList();
            render();
            return;
          }
          if (chAction === 'on_shelf') {
            if (!channelIsOffShelf(storeCh, cs)) return;
            delete cs.shelfStatus;
            if (storeCh.shelfStatus === 'off_shelf') delete storeCh.shelfStatus;
            saveThemes(themesCh);
            renderStoresModalList();
            render();
            return;
          }
          return;
        }
        var btn = e.target.closest('[data-store-batch-action]');
        if (!btn) return;
        e.stopPropagation();
        var action = btn.getAttribute('data-store-batch-action');
        var mid = btn.getAttribute('data-store-mid');
        if (!mid || !currentModalThemeId) return;
        if (action === 'all_off_shelf') {
          if (!applyStoreBatchChannelAction(currentModalThemeId, mid, 'hide')) return;
          document.querySelectorAll('.store-batch-menu').forEach(function(m) { m.classList.add('hidden'); });
          renderStoresModalList();
          render();
          return;
        }
        if (action === 'all_on_shelf') {
          if (!applyStoreBatchChannelAction(currentModalThemeId, mid, 'show')) return;
          document.querySelectorAll('.store-batch-menu').forEach(function(m) { m.classList.add('hidden'); });
          renderStoresModalList();
          render();
          return;
        }
      });

      function closeStoresModal() {
        hideAllDropdownMenus();
        storesModal.classList.add('hidden');
        storesModal.classList.remove('flex');
      }

      storesModalClose.addEventListener('click', closeStoresModal);
      storesModal.addEventListener('click', function(e) {
        if (e.target === storesModal) closeStoresModal();
      });
      document.addEventListener('keydown', function(e) {
        if (e.key !== 'Escape') return;
        if (storesModal.classList.contains('hidden')) return;
        var sm = document.getElementById('storesEffectStatusFilterMenu');
        if (sm && !sm.classList.contains('hidden')) {
          e.preventDefault();
          sm.classList.add('hidden');
          var st = document.getElementById('storesEffectStatusTrigger');
          if (st) st.setAttribute('aria-expanded', 'false');
          return;
        }
        closeStoresModal();
      });

      function renderPagination(totalCount, totalPages) {
        var prevBtn = document.getElementById('prevPageBtn');
        var nextBtn = document.getElementById('nextPageBtn');
        var pageNumbersEl = document.getElementById('pageNumbers');
        var pageSizeSelect = document.getElementById('pageSizeSelect');

        if (!prevBtn || !nextBtn || !pageNumbersEl) return;

        prevBtn.disabled = currentPage <= 1;
        nextBtn.disabled = currentPage >= totalPages;

        var pageHtml = '';
        var maxVisiblePages = 5;
        var startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
        var endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
        if (endPage - startPage + 1 < maxVisiblePages) {
          startPage = Math.max(1, endPage - maxVisiblePages + 1);
        }

        if (startPage > 1) {
          pageHtml += '<button type="button" class="page-num flex h-8 min-w-[32px] items-center justify-center rounded-lg px-1.5 text-sm text-[rgba(0,0,0,0.88)] hover:bg-black/[0.04]" data-page="1">1</button>';
          if (startPage > 2) {
            pageHtml += '<span class="px-1 text-sm text-[rgba(0,0,0,0.25)]">...</span>';
          }
        }

        for (var i = startPage; i <= endPage; i++) {
          if (i === currentPage) {
            pageHtml += '<button type="button" class="page-num flex h-8 min-w-[32px] items-center justify-center rounded-lg bg-black/[0.04] px-1.5 text-sm font-semibold text-primary" data-page="' + i + '">' + i + '</button>';
          } else {
            pageHtml += '<button type="button" class="page-num flex h-8 min-w-[32px] items-center justify-center rounded-lg px-1.5 text-sm text-[rgba(0,0,0,0.88)] hover:bg-black/[0.04]" data-page="' + i + '">' + i + '</button>';
          }
        }

        if (endPage < totalPages) {
          if (endPage < totalPages - 1) {
            pageHtml += '<span class="px-1 text-sm text-[rgba(0,0,0,0.25)]">...</span>';
          }
          pageHtml += '<button type="button" class="page-num flex h-8 min-w-[32px] items-center justify-center rounded-lg px-1.5 text-sm text-[rgba(0,0,0,0.88)] hover:bg-black/[0.04]" data-page="' + totalPages + '">' + totalPages + '</button>';
        }

        pageNumbersEl.innerHTML = pageHtml;

        pageNumbersEl.querySelectorAll('.page-num').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var page = parseInt(this.getAttribute('data-page'), 10);
            if (page !== currentPage) {
              currentPage = page;
              render();
            }
          });
        });
      }

      document.getElementById('prevPageBtn').addEventListener('click', function() {
        if (currentPage > 1) {
          currentPage--;
          render();
        }
      });

      document.getElementById('nextPageBtn').addEventListener('click', function() {
        var totalPages = Math.ceil(lastFilteredTotal / pageSize) || 1;
        if (currentPage < totalPages) {
          currentPage++;
          render();
        }
      });

      document.getElementById('pageSizeSelect').addEventListener('change', function() {
        pageSize = parseInt(this.value, 10);
        currentPage = 1;
        render();
      });

      setupFilterShelfStatusDropdown();
      setupStoresEffectStatusDropdown();

      document.getElementById('filterName').addEventListener('input', function() {
        currentPage = 1;
        render();
      });

      document.getElementById('filterShelfStatus').addEventListener('change', function() {
        currentPage = 1;
        render();
      });

      document.getElementById('filterStartDate').addEventListener('change', function() {
        currentPage = 1;
        render();
      });

      document.getElementById('filterEndDate').addEventListener('change', function() {
        currentPage = 1;
        render();
      });

      document.getElementById('filterResetBtn').addEventListener('click', function() {
        document.getElementById('filterName').value = '';
        document.getElementById('filterShelfStatus').value = '';
        document.getElementById('filterStartDate').value = '';
        document.getElementById('filterEndDate').value = '';
        if (window.__syncFilterShelfStatusDropdown) window.__syncFilterShelfStatusDropdown();
        currentPage = 1;
        render();
      });

      if (deleteConfirmCancel) {
        deleteConfirmCancel.addEventListener('click', closeDeleteConfirmModal);
      }
      if (deleteConfirmOk) {
        deleteConfirmOk.addEventListener('click', executeDeleteTheme);
      }
      if (deleteConfirmModal) {
        deleteConfirmModal.addEventListener('click', function(e) {
          if (e.target === deleteConfirmModal) closeDeleteConfirmModal();
        });
      }
      if (publishBlockOk) {
        publishBlockOk.addEventListener('click', closePublishBlockModal);
      }
      if (publishBlockModal) {
        publishBlockModal.addEventListener('click', function(e) {
          if (e.target === publishBlockModal) closePublishBlockModal();
        });
      }
      document.addEventListener('keydown', function(e) {
        if (e.key !== 'Escape') return;
        if (deleteConfirmModal && !deleteConfirmModal.classList.contains('hidden')) {
          e.preventDefault();
          closeDeleteConfirmModal();
          return;
        }
        if (publishBlockModal && !publishBlockModal.classList.contains('hidden')) {
          e.preventDefault();
          closePublishBlockModal();
        }
      });

      render();
    })();
  </script>
</body>
</html>
