<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>屏保 - 营销中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/common.css" />
  <script src="assets/kiosk-theme-media-idb.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#1677ff', 'sidebar-bg': '#fafafa', 'sidebar-active': '#e6f4ff' }, borderRadius: { ant: '6px' } } } };
  </script>
</head>
<body class="bg-white text-gray-900 antialiased">
  <div class="app-layout flex min-h-screen">
    <aside class="sidebar flex-shrink-0 flex flex-col w-60">
      <div class="p-4 border-b border-gray-100 flex items-center gap-2">
        <div class="w-8 h-8 rounded bg-amber-400 flex items-center justify-center text-white font-bold">M</div>
        <span class="font-medium">MenuSifu</span>
        <div class="ml-auto flex gap-1">
          <button type="button" class="p-1 rounded hover:bg-gray-100" aria-label="文档">📄</button>
          <button type="button" class="p-1 rounded hover:bg-gray-100" aria-label="全屏">⊞</button>
        </div>
      </div>
      <nav class="flex-1 p-3 space-y-1 overflow-auto">
        <a href="material.html" class="menu-item px-3 py-2 text-gray-600 flex items-center justify-between rounded-ant hover:bg-gray-100"><span>图片素材</span></a>
        <div class="nav-group">
          <div class="nav-group-title menu-item px-3 py-2 text-gray-600 flex items-center justify-between cursor-pointer hover:bg-gray-100 rounded-ant" onclick="this.parentElement.classList.toggle('collapsed')">
            <span>营销中心</span>
            <span class="nav-arrow text-xs transition-transform">⌄</span>
          </div>
          <div class="nav-group-items pl-3 space-y-0.5">
            <a href="kiosk-theme-list.html" class="menu-item active px-3 py-2 flex items-center rounded-ant bg-sidebar-active text-primary font-medium">屏保</a>
          </div>
        </div>
      </nav>
      <div class="p-3 border-t border-gray-100 flex items-center gap-2">
        <button type="button" class="p-1.5 rounded hover:bg-gray-100">📄</button>
        <span class="w-px h-4 bg-gray-200"></span>
        <button type="button" class="p-1.5 rounded hover:bg-gray-100">👤</button>
        <a href="#" class="flex-1 flex items-center justify-between text-gray-600 text-sm"><span>M's Coffee</span><span>→</span></a>
      </div>
    </aside>
    <main class="main-content flex-1 flex flex-col min-w-0">
      <!-- 空状态：无数据时显示 -->
      <div id="emptyState" class="flex-1 flex flex-col items-center justify-center py-16 px-4 hidden">
        <div class="empty-illustration w-64 h-48 mb-6 bg-gray-50 rounded-ant flex items-center justify-center text-gray-400 border border-dashed border-gray-200">
          <div class="text-center">
            <div class="text-4xl mb-2" aria-hidden="true">🖼️</div>
            <p class="text-sm text-gray-400">屏保预览占位</p>
          </div>
        </div>
        <h2 class="empty-state-title text-xl font-semibold text-gray-800">暂无屏保</h2>
        <p class="empty-state-desc text-gray-500">创建屏保主题并下发到门店设备</p>
        <a href="screensaver-create.html" class="btn-primary inline-flex items-center justify-center gap-1.5 px-5 py-2.5 rounded-ant text-sm font-medium focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">
          <span>+</span> 新建
        </a>
      </div>
      <!-- 列表状态：有数据时显示 -->
      <div id="listState" class="flex-1 flex flex-col min-w-0 hidden">
        <div class="flex flex-wrap items-center gap-3 mb-4">
          <div class="relative min-w-[180px] max-w-xs">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none" aria-hidden="true">🔍</span>
            <input type="text" id="filterName" placeholder="主题名称" class="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-ant text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" aria-label="按主题名称筛选" />
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <span class="text-sm text-gray-600 whitespace-nowrap">生效状态</span>
            <select id="filterEffectStatus" class="px-3 py-2 border border-gray-200 rounded-ant text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" aria-label="按生效状态筛选">
            <option value="" selected>全部</option>
            <option value="待生效">待生效</option>
            <option value="已生效">已生效</option>
            <option value="已失效">已失效</option>
          </select>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <span class="text-sm text-gray-600 whitespace-nowrap">创建时间</span>
            <input type="date" id="filterStartDate" class="w-32 px-2 py-2 border border-gray-200 rounded-ant text-sm focus:outline-none focus:border-primary" title="创建开始日期" aria-label="创建开始日期" />
            <span class="text-gray-400">→</span>
            <input type="date" id="filterEndDate" class="w-32 px-2 py-2 border border-gray-200 rounded-ant text-sm focus:outline-none focus:border-primary" title="创建结束日期" aria-label="创建结束日期" />
          </div>
          <button type="button" id="filterResetBtn" class="btn-default px-4 py-2 rounded-ant text-sm">重置</button>
          <a href="screensaver-create.html" class="btn-primary ml-auto inline-flex items-center gap-1.5 px-4 py-2 rounded-ant text-sm font-medium focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">+ 新建</a>
        </div>
        <div id="themeListContainer" class="space-y-4 flex-1">
          <!-- 屏保卡片由 JS 渲染 -->
        </div>
        <div id="paginationBar" class="flex items-center justify-between mt-4 pt-4 border-t border-gray-100 flex-shrink-0">
          <span class="text-gray-500 text-sm">共 <span id="totalCount">0</span> 条</span>
          <div class="flex items-center gap-2">
            <button type="button" id="prevPageBtn" class="btn-default p-2 min-w-[32px] rounded-ant text-sm disabled:opacity-50 disabled:cursor-not-allowed" aria-label="上一页">&lt;</button>
            <div id="pageNumbers" class="flex items-center gap-1"></div>
            <button type="button" id="nextPageBtn" class="btn-default p-2 min-w-[32px] rounded-ant text-sm disabled:opacity-50 disabled:cursor-not-allowed" aria-label="下一页">&gt;</button>
            <select id="pageSizeSelect" class="ml-2 px-2 py-1.5 border border-gray-200 rounded-ant text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
              <option value="10">10 条/页</option>
              <option value="20" selected>20 条/页</option>
              <option value="50">50 条/页</option>
            </select>
          </div>
        </div>
      </div>
    </main>
  </div>
  <!-- 图片预览模态框：遮罩单独一层，避免误点空白区当作「点蒙层关闭」；导航 z-index 高于图片 -->
  <div id="imagePreviewModal" class="fixed inset-0 z-50 hidden">
    <button type="button" id="previewBackdrop" class="absolute inset-0 z-0 block h-full w-full cursor-default border-0 bg-black/80 p-0" aria-label="关闭预览"></button>
    <div class="pointer-events-none absolute inset-0 z-10 flex items-center justify-center isolate">
      <!-- 大图 / 视频预览：同层切换，避免与左右导航重叠时抢占点击 -->
      <img id="previewImage" src="" alt="预览大图" draggable="false" class="pointer-events-auto relative z-10 mt-10 max-h-[calc(85vh-6.5rem)] max-w-[90vw] select-none rounded-lg object-contain shadow-2xl" />
      <video id="previewVideo" class="pointer-events-auto relative z-10 mt-10 hidden max-h-[calc(85vh-6.5rem)] max-w-[90vw] rounded-lg object-contain shadow-2xl" controls playsinline preload="metadata" aria-label="预览视频"></video>
      <button type="button" id="previewClose" class="pointer-events-auto absolute top-4 right-4 z-50 w-10 h-10 rounded-full bg-white/20 hover:bg-white/40 text-white text-2xl flex items-center justify-center transition-colors" aria-label="关闭">×</button>
      <div id="previewOrientationSwitch" class="pointer-events-auto absolute top-14 left-1/2 z-50 flex -translate-x-1/2 items-center gap-0.5 rounded-full border border-white/15 bg-black/55 p-0.5 shadow-lg backdrop-blur-sm" role="tablist" aria-label="屏保版式切换">
        <button type="button" id="previewTabPortrait" role="tab" class="preview-orient-tab px-4 py-1.5 rounded-full text-sm font-medium transition-colors text-white/85 hover:bg-white/10 hover:text-white" aria-selected="true">竖版</button>
        <button type="button" id="previewTabLandscape" role="tab" class="preview-orient-tab px-4 py-1.5 rounded-full text-sm font-medium transition-colors text-white/85 hover:bg-white/10 hover:text-white" aria-selected="false">横版</button>
      </div>
      <div id="previewCounter" class="pointer-events-auto absolute bottom-6 left-1/2 z-50 max-w-[90vw] -translate-x-1/2 rounded-full bg-white/20 px-4 py-2 text-center text-sm leading-snug text-white"></div>
      <!-- 独立最高层仅承载左右翻页，避免与大图/关闭钮同 z 时右侧命中被挡 -->
      <div class="pointer-events-none absolute inset-0 z-[100]" aria-hidden="true">
        <button type="button" id="previewPrev" class="pointer-events-auto absolute left-4 top-1/2 flex h-12 w-12 -translate-y-1/2 touch-manipulation items-center justify-center rounded-full bg-white/20 text-2xl text-white transition-colors hover:bg-white/40" aria-label="上一张">&lt;</button>
        <button type="button" id="previewNext" class="pointer-events-auto absolute right-4 top-1/2 flex h-12 w-12 -translate-y-1/2 touch-manipulation items-center justify-center rounded-full bg-white/20 text-2xl text-white transition-colors hover:bg-white/40" aria-label="下一张">&gt;</button>
      </div>
    </div>
  </div>
  <!-- 门店详情模态框 -->
  <div id="storesModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-lg max-h-[80vh] flex flex-col">
      <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
        <h3 class="font-semibold text-gray-800">关联门店详情</h3>
        <button type="button" id="storesModalClose" class="w-8 h-8 rounded hover:bg-gray-100 flex items-center justify-center text-gray-500" aria-label="关闭">×</button>
      </div>
      <div class="flex items-center justify-between px-4 py-2 border-b border-gray-100 text-sm">
        <div class="flex items-center gap-4">
          <span class="text-gray-500">总计: <span id="storesTotal" class="font-medium text-gray-800">0</span></span>
        </div>
      </div>
      <div class="px-4 py-3 border-b border-gray-100 space-y-2 flex-shrink-0 bg-gray-50/50">
        <div class="flex flex-wrap gap-2 items-center">
          <label for="storesMidSearch" class="text-xs text-gray-500 whitespace-nowrap">MID</label>
          <input type="text" id="storesMidSearch" placeholder="输入 MID 搜索" class="min-w-[120px] flex-1 max-w-[200px] px-2 py-1.5 border border-gray-200 rounded-ant text-sm bg-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" autocomplete="off" aria-label="按 MID 搜索门店" />
          <button type="button" id="storesFilterReset" class="px-2.5 py-1.5 text-xs rounded-ant border border-gray-200 bg-white hover:bg-gray-50 text-gray-600">重置</button>
        </div>
        <p id="storesFilteredHint" class="text-xs text-gray-400 hidden" aria-live="polite"></p>
        <p class="text-xs text-amber-800 bg-amber-50 border border-amber-100 rounded-ant px-2 py-1.5">各关联渠道可按渠道<strong>单独</strong>设为<strong>不展示</strong>或<strong>恢复展示</strong>；并支持按门店进行<strong>全渠道不展示</strong>/<strong>全渠道展示</strong>批量设置；不支持在此修改门店名称或 MID。</p>
      </div>
      <div id="storesListContainer" class="flex-1 overflow-auto p-4 space-y-2"></div>
    </div>
  </div>
  <!-- 删除屏保二次确认（不使用浏览器 confirm） -->
  <div id="deleteConfirmModal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/50 p-4" aria-hidden="true">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-sm" role="dialog" aria-modal="true" aria-labelledby="deleteConfirmTitle">
      <div class="px-4 py-3 border-b border-gray-200">
        <h3 id="deleteConfirmTitle" class="font-semibold text-gray-800">删除屏保</h3>
      </div>
      <p class="px-4 py-4 text-sm text-gray-600 leading-relaxed">确定删除屏保主题「<strong id="deleteConfirmThemeName" class="text-gray-800 font-medium"></strong>」吗？删除后不可恢复。</p>
      <div class="px-4 py-3 border-t border-gray-100 flex justify-end gap-2">
        <button type="button" id="deleteConfirmCancel" class="px-4 py-2 rounded-ant border border-gray-200 text-sm text-gray-700 hover:bg-gray-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-1">取消</button>
        <button type="button" id="deleteConfirmOk" class="px-4 py-2 rounded-ant bg-red-600 text-white text-sm hover:bg-red-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-red-600 focus-visible:ring-offset-1">删除</button>
      </div>
    </div>
  </div>
  <!-- 上架拦截：与已上架主题在相同门店+渠道上生效时间重叠 -->
  <div id="publishBlockModal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/50 p-4" aria-hidden="true">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md flex flex-col max-h-[85vh]" role="dialog" aria-modal="true" aria-labelledby="publishBlockTitle">
      <div class="px-4 py-3 border-b border-gray-200 flex-shrink-0">
        <h3 id="publishBlockTitle" class="font-semibold text-gray-800">无法上架</h3>
      </div>
      <div class="px-4 py-4 min-h-0 max-h-[50vh] overflow-y-auto overscroll-contain">
        <p id="publishBlockMessage" class="text-sm text-gray-600 leading-relaxed whitespace-pre-line"></p>
      </div>
      <div class="px-4 py-3 border-t border-gray-100 flex justify-end flex-shrink-0">
        <button type="button" id="publishBlockOk" class="px-4 py-2 rounded-ant bg-primary text-white text-sm hover:bg-blue-600 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-1">知道了</button>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var STORAGE_KEY = 'kiosk_themes';
      var currentPage = 1;
      var pageSize = 20;
      var pendingDeleteThemeId = null;
      var listHydrateBlobUrls = [];
      var previewOpenBlobUrls = [];

      function revokeListHydrateBlobUrls() {
        listHydrateBlobUrls.forEach(function(u) {
          try { URL.revokeObjectURL(u); } catch (e) { /* ignore */ }
        });
        listHydrateBlobUrls = [];
      }

      function hydrateThemeListMedia(list) {
        revokeListHydrateBlobUrls();
        var idb = window.KioskThemeMediaIdb;
        if (!idb || !idb.supported()) return Promise.resolve();
        var tasks = [];
        list.forEach(function(theme) {
          [theme.portraitImages, theme.landscapeImages].forEach(function(arr) {
            if (!arr) return;
            arr.forEach(function(m) {
              if (typeof m === 'object' && m.type === 'video' && m.mediaRef) {
                delete m._displaySrc;
                tasks.push(
                  idb.get(m.mediaRef).then(function(blob) {
                    if (blob) {
                      var u = URL.createObjectURL(blob);
                      listHydrateBlobUrls.push(u);
                      m._displaySrc = u;
                    }
                  })
                );
              }
            });
          });
        });
        return Promise.all(tasks);
      }

      function revokePreviewOpenBlobUrls() {
        previewOpenBlobUrls.forEach(function(u) {
          try { URL.revokeObjectURL(u); } catch (e) { /* ignore */ }
        });
        previewOpenBlobUrls = [];
      }

      function hydrateThemeForPreview(theme) {
        revokePreviewOpenBlobUrls();
        var idb = window.KioskThemeMediaIdb;
        if (!idb || !idb.supported()) return Promise.resolve();
        var tasks = [];
        function scan(arr) {
          if (!arr) return;
          arr.forEach(function(m) {
            if (typeof m === 'object' && m.type === 'video' && m.mediaRef) {
              delete m._displaySrc;
              tasks.push(
                idb.get(m.mediaRef).then(function(blob) {
                  if (blob) {
                    var u = URL.createObjectURL(blob);
                    previewOpenBlobUrls.push(u);
                    m._displaySrc = u;
                  }
                })
              );
            }
          });
        }
        scan(theme.portraitImages);
        scan(theme.landscapeImages);
        return Promise.all(tasks);
      }

      function collectVideoMediaRefs(theme) {
        var refs = [];
        function scan(arr) {
          if (!arr) return;
          arr.forEach(function(m) {
            if (m && typeof m === 'object' && m.type === 'video' && m.mediaRef) refs.push(m.mediaRef);
          });
        }
        scan(theme.portraitImages);
        scan(theme.landscapeImages);
        return refs;
      }

      var deleteConfirmModal = document.getElementById('deleteConfirmModal');
      var deleteConfirmThemeName = document.getElementById('deleteConfirmThemeName');
      var deleteConfirmCancel = document.getElementById('deleteConfirmCancel');
      var deleteConfirmOk = document.getElementById('deleteConfirmOk');
      var publishBlockModal = document.getElementById('publishBlockModal');
      var publishBlockMessage = document.getElementById('publishBlockMessage');
      var publishBlockOk = document.getElementById('publishBlockOk');

      function openDeleteConfirmModal() {
        if (!deleteConfirmModal) return;
        deleteConfirmModal.classList.remove('hidden');
        deleteConfirmModal.classList.add('flex');
        deleteConfirmModal.setAttribute('aria-hidden', 'false');
        if (deleteConfirmOk) deleteConfirmOk.focus();
      }

      function closeDeleteConfirmModal() {
        pendingDeleteThemeId = null;
        if (!deleteConfirmModal) return;
        deleteConfirmModal.classList.add('hidden');
        deleteConfirmModal.classList.remove('flex');
        deleteConfirmModal.setAttribute('aria-hidden', 'true');
      }

      function openPublishBlockModal(message) {
        if (publishBlockMessage) publishBlockMessage.textContent = message || '';
        if (!publishBlockModal) return;
        publishBlockModal.classList.remove('hidden');
        publishBlockModal.classList.add('flex');
        publishBlockModal.setAttribute('aria-hidden', 'false');
        if (publishBlockOk) publishBlockOk.focus();
      }

      function closePublishBlockModal() {
        if (!publishBlockModal) return;
        publishBlockModal.classList.add('hidden');
        publishBlockModal.classList.remove('flex');
        publishBlockModal.setAttribute('aria-hidden', 'true');
      }

      function executeDeleteTheme() {
        if (!pendingDeleteThemeId) return;
        var id = pendingDeleteThemeId;
        var all = getThemes();
        var doomed = all.find(function(t) { return t.id === id; });
        var refs = doomed && window.KioskThemeMediaIdb && KioskThemeMediaIdb.supported() ? collectVideoMediaRefs(doomed) : [];
        function applyDelete() {
          cancelAllChannelDisplayOpTimersForTheme(id);
          var list = all.filter(function(t) { return t.id !== id; });
          saveThemes(list);
          closeDeleteConfirmModal();
          render();
        }
        if (refs.length) {
          Promise.all(refs.map(function(r) { return KioskThemeMediaIdb.del(r).catch(function() {}); })).then(applyDelete);
        } else {
          applyDelete();
        }
      }

      function getThemes() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          var list = raw ? JSON.parse(raw) : [];
          var defaultIds = { 'demo1': true, 'demo2': true };
          var filtered = list.filter(function(t) { return !defaultIds[t.id]; });
          if (filtered.length !== list.length) {
            saveThemes(filtered);
            list = filtered;
          }
          return list;
        } catch (e) {
          return [];
        }
      }

      function saveThemes(list) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
      }

      function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      /** 列表/预览中判断是否为视频素材（与新建/编辑页写入的 { type:'video', dataUrl } 一致） */
      function isPreviewVideoMedia(item) {
        if (!item) return false;
        if (typeof item === 'object' && item.type === 'video') return true;
        var u = typeof item === 'string' ? item : (item.dataUrl || '');
        return typeof u === 'string' && u.indexOf('data:video') === 0;
      }

      function previewMediaSrc(item) {
        if (!item) return '';
        if (typeof item === 'object' && item._displaySrc) return item._displaySrc;
        return typeof item === 'string' ? item : (item.dataUrl || '');
      }

      function parseDateTime(str) {
        if (!str || str === '--') return null;
        var normalized = str.replace(/\//g, '-');
        var d = new Date(normalized);
        return isNaN(d.getTime()) ? null : d;
      }

      function computeEffectStatus(effectTime) {
        if (!effectTime || effectTime === '--') return null;
        var now = new Date();
        if (effectTime === '立即生效') {
          return { text: '已生效', color: 'bg-green-100 text-green-700' };
        }
        var parts = effectTime.split(' - ');
        if (parts.length !== 2) return null;
        var startDt = parseDateTime(parts[0].trim());
        var endDt = parseDateTime(parts[1].trim());
        if (!startDt || !endDt) return null;
        if (now < startDt) return { text: '待生效', color: 'bg-yellow-100 text-yellow-700' };
        if (now > endDt) return { text: '已失效', color: 'bg-gray-200 text-gray-600' };
        return { text: '已生效', color: 'bg-green-100 text-green-700' };
      }

      /** 已上架且生效期已结束 → 展示为已下架 */
      function getPublishedTimingEffectLabel(theme) {
        if (!theme || theme.publishStatus !== 'published') return null;
        var s = computeEffectStatus(theme.effectTime);
        return s ? s.text : null;
      }

      /** 上架状态：草稿为未上架；已上架且已失效为已下架；已上架否则为已上架 */
      function getListShelfStatus(theme) {
        if (!theme) return { text: '—', color: 'bg-gray-100 text-gray-600' };
        if (theme.publishStatus === 'draft') {
          return { text: '未上架', color: 'bg-gray-100 text-gray-600' };
        }
        var timing = getPublishedTimingEffectLabel(theme);
        if (timing === '已失效') {
          return { text: '已下架', color: 'bg-amber-100 text-amber-800' };
        }
        return { text: '已上架', color: 'bg-green-100 text-green-700' };
      }

      /** 列表展示口径：未上架固定「待生效」；已上架按生效时间计算 */
      function getListEffectStatus(theme) {
        if (!theme) return null;
        if (theme.publishStatus && theme.publishStatus !== 'published') {
          return { text: '待生效', color: 'bg-yellow-100 text-yellow-700' };
        }
        return computeEffectStatus(theme.effectTime);
      }

      /** 与 effective-time.html 一致：解析主题的生效时间窗（含「立即生效」） */
      function parseStoredThemeEffectRange(theme) {
        var et = theme && theme.effectTime;
        if (!et || et === '--') return null;
        if (et === '立即生效') {
          var dist = theme.distributeTime;
          if (dist && dist !== '--') {
            var d = new Date(String(dist).replace(/\//g, '-'));
            if (!isNaN(d.getTime())) return { start: d.getTime(), end: Infinity };
          }
          return { start: Date.now(), end: Infinity };
        }
        var parts = String(et).split(' - ');
        if (parts.length !== 2) return null;
        var start = new Date(parts[0].trim().replace(/\//g, '-'));
        var end = new Date(parts[1].trim().replace(/\//g, '-'));
        if (isNaN(start.getTime()) || isNaN(end.getTime())) return null;
        return { start: start.getTime(), end: end.getTime() };
      }

      function rangesOverlap(a, b) {
        if (!a || !b) return false;
        return a.start < b.end && b.start < a.end;
      }

      function getThemeStoreChannelPairs(theme) {
        var pairs = [];
        var seen = {};
        var stores = theme && theme.distributedStores ? theme.distributedStores : [];
        stores.forEach(function(store) {
          var mid = store && store.mid != null ? String(store.mid) : '';
          var arr = store && Array.isArray(store.channelStatuses) ? store.channelStatuses : [];
          arr.forEach(function(cs) {
            var ch = cs && cs.channel != null ? String(cs.channel) : '';
            if (!mid || !ch) return;
            var key = mid + '\x1e' + ch;
            if (seen[key]) return;
            seen[key] = true;
            pairs.push({ mid: mid, channel: ch });
          });
        });
        return pairs;
      }

      function hasStoreChannelPair(theme, mid, channel) {
        var m = String(mid);
        var c = String(channel);
        var stores = theme && theme.distributedStores ? theme.distributedStores : [];
        for (var i = 0; i < stores.length; i++) {
          var st = stores[i];
          if (String(st.mid) !== m) continue;
          var arr = st.channelStatuses || [];
          for (var j = 0; j < arr.length; j++) {
            if (String(arr[j].channel || '') === c) return true;
          }
        }
        return false;
      }

      /** 上架前校验：与任意已上架主题在相同门店+相同渠道上生效时间是否重叠 */
      function findShelfTimeConflictsForPublish(candidate, allThemes) {
        var myRange = parseStoredThemeEffectRange(candidate);
        if (!myRange) {
          return {
            kind: 'no_range',
            message: '当前主题未配置有效的生效时间，无法上架。请先通过下发流程配置门店、渠道与生效时间。'
          };
        }
        var myPairs = getThemeStoreChannelPairs(candidate);
        if (!myPairs.length) {
          return { kind: 'ok' };
        }
        var conflicts = [];
        var seen = {};
        for (var i = 0; i < allThemes.length; i++) {
          var other = allThemes[i];
          if (!other || other.id === candidate.id) continue;
          if (other.publishStatus !== 'published') continue;
          var otherRange = parseStoredThemeEffectRange(other);
          if (!otherRange) continue;
          if (!rangesOverlap(myRange, otherRange)) continue;
          var tname = other.name ? String(other.name) : '未命名主题';
          for (var p = 0; p < myPairs.length; p++) {
            var pair = myPairs[p];
            if (!hasStoreChannelPair(other, pair.mid, pair.channel)) continue;
            var key = String(other.id) + '\x1e' + pair.mid + '\x1e' + pair.channel;
            if (seen[key]) continue;
            seen[key] = true;
            conflicts.push({
              themeId: other.id,
              themeName: tname,
              effectTime: other.effectTime,
              distributeTime: other.distributeTime,
              mid: pair.mid,
              channel: pair.channel
            });
          }
        }
        if (!conflicts.length) return { kind: 'ok' };
        return { kind: 'overlap', conflicts: conflicts };
      }

      function formatPublishOverlapMessage(conflicts, candidate) {
        function overlapThemeTimeRangeLine(r) {
          var et = r.effectTime;
          if (!et || et === '--') return '生效时间段：—';
          if (et === '立即生效') {
            if (r.distributeTime && r.distributeTime !== '--') {
              return '生效时间段：立即生效（记录时间 ' + r.distributeTime + '）';
            }
            return '生效时间段：立即生效';
          }
          return '生效时间段：' + et;
        }
        function lookupStoreName(mid) {
          var stores = candidate && candidate.distributedStores ? candidate.distributedStores : [];
          for (var i = 0; i < stores.length; i++) {
            if (String(stores[i].mid) === String(mid)) {
              return stores[i].name ? String(stores[i].name).trim() : '';
            }
          }
          return '';
        }

        var enriched = conflicts.map(function(c) {
          return {
            themeId: c.themeId,
            themeName: c.themeName,
            effectTime: c.effectTime,
            distributeTime: c.distributeTime,
            mid: c.mid,
            channel: c.channel,
            storeName: lookupStoreName(c.mid)
          };
        });

        var groupMap = {};
        enriched.forEach(function(c) {
          var gk = c.storeName ? ('name:' + c.storeName) : ('mid:' + c.mid);
          if (!groupMap[gk]) groupMap[gk] = { storeName: c.storeName, rows: [] };
          groupMap[gk].rows.push(c);
        });

        var gks = Object.keys(groupMap).sort(function(a, b) {
          var A = groupMap[a];
          var B = groupMap[b];
          var an = A.storeName || '';
          var bn = B.storeName || '';
          if (an !== bn) return an.localeCompare(bn, 'zh-CN');
          return a.localeCompare(b);
        });

        var globalSeen = {};
        var globalThemes = [];
        enriched.forEach(function(r) {
          var id = r.themeId != null ? String(r.themeId) : '';
          if (id) {
            if (globalSeen[id]) return;
            globalSeen[id] = true;
          } else {
            var fallback = r.themeName + '\x1e' + String(r.effectTime || '') + '\x1e' + r.mid + '\x1e' + r.channel;
            if (globalSeen[fallback]) return;
            globalSeen[fallback] = true;
          }
          globalThemes.push(r);
        });
        globalThemes.sort(function(a, b) {
          return String(a.themeName).localeCompare(String(b.themeName), 'zh-CN');
        });

        var out = [];
        out.push('在相同门店、相同渠道下，当前主题与已生效主题存在生效时间重叠，无法上架。');
        out.push('');
        if (globalThemes.length) {
          out.push('冲突已生效主题：');
          globalThemes.forEach(function(r) {
            out.push('  · 「' + r.themeName + '」');
            out.push('    ' + overlapThemeTimeRangeLine(r));
          });
          out.push('');
        }

        gks.forEach(function(gk) {
          var g = groupMap[gk];
          var mids = {};
          g.rows.forEach(function(r) { mids[r.mid] = true; });
          var midStr = Object.keys(mids).join('、');

          var title;
          if (g.storeName) {
            title = '「' + g.storeName + '」（MID ' + midStr + '）';
          } else {
            title = '（MID ' + midStr + '）';
          }
          out.push(title);

          var chanSet = {};
          g.rows.forEach(function(r) { chanSet[r.channel] = true; });
          var chSorted = Object.keys(chanSet).sort(function(x, y) {
            return String(x).localeCompare(String(y), 'zh-CN');
          });
          out.push('关联渠道：' + chSorted.join('、'));
          out.push('');
        });

        return out.join('\n').trim();
      }

      function render() {
        var list = getThemes();
        var emptyState = document.getElementById('emptyState');
        var listState = document.getElementById('listState');
        var container = document.getElementById('themeListContainer');
        var totalEl = document.getElementById('totalCount');
        if (!emptyState || !listState) return;

        if (list.length === 0) {
          emptyState.classList.remove('hidden');
          emptyState.classList.add('flex');
          listState.classList.add('hidden');
          return;
        }

        emptyState.classList.add('hidden');
        listState.classList.remove('hidden');
        if (!container) return;

        /** 列表排序：仅按生效时间窗（与主题级「下发状态」无关） */
        function getStatusPriority(theme) {
          var effTime = theme.effectTime;
          if (!effTime || effTime === '--') return 6;
          if (effTime === '立即生效') return 2;
          var parts = effTime.split(' - ');
          if (parts.length === 2) {
            var startDt = new Date(parts[0].trim().replace(/\//g, '-'));
            var endDt = new Date(parts[1].trim().replace(/\//g, '-'));
            var now = new Date();
            if (isNaN(startDt.getTime()) || isNaN(endDt.getTime())) return 6;
            if (now < startDt) return 1;
            if (now > endDt) return 5;
            return 2;
          }
          return 6;
        }

        list.sort(function(a, b) {
          var pa = getStatusPriority(a);
          var pb = getStatusPriority(b);
          if (pa !== pb) return pa - pb;
          var ta = a.createTime ? new Date(a.createTime.replace(/\//g, '-')) : new Date(0);
          var tb = b.createTime ? new Date(b.createTime.replace(/\//g, '-')) : new Date(0);
          return tb - ta;
        });

        var filterName = (document.getElementById('filterName').value || '').trim().toLowerCase();
        var filterEffStatus = document.getElementById('filterEffectStatus').value;
        var filterStartDate = document.getElementById('filterStartDate').value;
        var filterEndDate = document.getElementById('filterEndDate').value;

        list = list.filter(function(t) {
          if (filterName && (!t.name || t.name.toLowerCase().indexOf(filterName) < 0)) return false;

          var effStatus = getListEffectStatus(t);
          if (filterEffStatus && (!effStatus || effStatus.text !== filterEffStatus)) return false;
          
          if (filterStartDate || filterEndDate) {
            var createDate = t.createTime ? parseDateTime(t.createTime) : null;
            if (!createDate) return false;
            if (filterStartDate) {
              var startD = new Date(filterStartDate);
              startD.setHours(0, 0, 0, 0);
              if (createDate < startD) return false;
            }
            if (filterEndDate) {
              var endD = new Date(filterEndDate);
              endD.setHours(23, 59, 59, 999);
              if (createDate > endD) return false;
            }
          }
          return true;
        });

        function finalizeListRender() {
        var totalCount = list.length;
        var totalPages = Math.ceil(totalCount / pageSize) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;
        var startIndex = (currentPage - 1) * pageSize;
        var endIndex = startIndex + pageSize;
        var pagedList = list.slice(startIndex, endIndex);

        function renderImageThumbs(images, isPortrait, themeId) {
          if (!images || !images.length) return '';
          var boxClass = isPortrait ? 'w-10 h-14' : 'w-14 h-10';
          var commonAttrs = 'data-theme-id="' + escapeHtml(themeId) + '" data-img-type="' + (isPortrait ? 'portrait' : 'landscape') + '"';
          return images.map(function(img, idx) {
            var src = previewMediaSrc(img);
            var safeSrc = escapeHtml(src);
            if (isPreviewVideoMedia(img)) {
              return '<video src="' + safeSrc + '" muted playsinline preload="metadata" draggable="false" disablepictureinpicture ' + commonAttrs + ' data-img-index="' + idx + '" class="preview-thumb cursor-pointer hover:opacity-80 transition-opacity ' + boxClass + ' rounded object-cover border border-gray-100"></video>';
            }
            return '<img src="' + safeSrc + '" alt="屏保" ' + commonAttrs + ' data-img-index="' + idx + '" class="preview-thumb cursor-pointer hover:opacity-80 transition-opacity ' + boxClass + ' rounded object-cover border border-gray-100" />';
          }).join('');
        }

        var html = pagedList.map(function(t) {
          var effectStr = t.effectTime || '--';
          var distributeStr = t.distributeTime || '--';
          var distributeBlock = (distributeStr && distributeStr !== '--')
            ? '<div><span class="text-gray-400">下发时间</span><div class="text-gray-700 mt-0.5">' + escapeHtml(distributeStr) + '</div></div>'
            : '';
          var channelsStr = (t.distributeChannels && t.distributeChannels.length) ? t.distributeChannels.join('、') : '--';
          var shelfStatus = getListShelfStatus(t);
          var shelfStatusBadge = '<span class="inline-block px-2 py-0.5 rounded text-xs font-medium ' + shelfStatus.color + '">' + escapeHtml(shelfStatus.text) + '</span>';
          var effectStatus = getListEffectStatus(t);
          var effStatusBadge;
          if (effectStatus) {
            effStatusBadge = '<span class="inline-block px-2 py-0.5 rounded text-xs font-medium ' + effectStatus.color + '">' + effectStatus.text + '</span>';
          } else {
            effStatusBadge = '<span class="text-gray-400">—</span>';
          }

          var hasPortrait = t.portraitImages && t.portraitImages.length;
          var hasLandscape = t.landscapeImages && t.landscapeImages.length;
          var hasImages = hasPortrait || hasLandscape;

          var imageSection = '';
          if (hasImages) {
            imageSection = '<div class="flex-shrink-0 w-36 border-r border-gray-100 pr-4">';
            if (hasPortrait) {
              imageSection += '<div class="mb-2"><div class="text-xs text-gray-500 mb-1">竖版</div><div class="flex gap-1 flex-wrap">' + renderImageThumbs(t.portraitImages, true, t.id) + '</div></div>';
            }
            if (hasLandscape) {
              imageSection += '<div><div class="text-xs text-gray-500 mb-1">横版</div><div class="flex gap-1 flex-wrap">' + renderImageThumbs(t.landscapeImages, false, t.id) + '</div></div>';
            }
            imageSection += '</div>';
          }

          var storesSection = '';
          if (t.distributedStores && t.distributedStores.length) {
            storesSection = '<div class="flex-shrink-0 w-32 border-l border-gray-100 pl-4">' +
              '<div class="text-xs text-gray-400 mb-2">关联门店</div>' +
              '<div class="text-xs text-gray-500">共 ' + t.distributedStores.length + ' 家</div>' +
              '<button type="button" class="view-stores-btn text-xs text-primary hover:underline mt-2" data-theme-id="' + escapeHtml(t.id) + '">查看详情</button>' +
            '</div>';
          }

          var isPublished = t.publishStatus === 'published';
          var timingLabel = isPublished ? getPublishedTimingEffectLabel(t) : null;
          var editLink = '<a href="screensaver-edit.html?id=' + encodeURIComponent(t.id) + '" class="block px-3 py-2 text-sm hover:bg-gray-50">编辑</a>';
          var deleteBtn = '<button type="button" class="delete-btn block w-full text-left px-3 py-2 text-sm hover:bg-gray-50 text-red-600">删除</button>';
          var unpublishBtn = '<button type="button" class="unpublish-btn block w-full text-left px-3 py-2 text-sm hover:bg-gray-50 text-gray-800" data-theme-id="' + escapeHtml(t.id) + '">下架</button>';
          var publishBtn = '<button type="button" class="publish-btn block w-full text-left px-3 py-2 text-sm hover:bg-gray-50 text-primary font-medium" data-theme-id="' + escapeHtml(t.id) + '">上架</button>';
          var publishRelistBtn = '<button type="button" class="publish-btn publish-relist-btn block w-full text-left px-3 py-2 text-sm hover:bg-gray-50 text-primary font-medium" data-theme-id="' + escapeHtml(t.id) + '" data-relist="1">上架</button>';

          var dropdownInner = '';
          if (!isPublished) {
            dropdownInner = publishBtn + editLink + deleteBtn;
          } else if (timingLabel === '已生效') {
            dropdownInner = unpublishBtn;
          } else if (timingLabel === '待生效') {
            dropdownInner = unpublishBtn + editLink + deleteBtn;
          } else if (timingLabel === '已失效') {
            dropdownInner = publishRelistBtn + editLink + deleteBtn;
          } else {
            dropdownInner = unpublishBtn + editLink + deleteBtn;
          }

          return '<div class="screensaver-card border border-gray-100 p-4 flex gap-4" data-id="' + escapeHtml(t.id) + '">' +
            imageSection +
            '<div class="flex-1 min-w-0">' +
              '<div class="flex items-center gap-2 mb-3">' +
                '<h3 class="font-medium text-gray-800 text-base">' + escapeHtml(t.name) + '</h3>' +
              '</div>' +
              '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-2 text-sm">' +
                '<div><span class="text-gray-400">创建时间</span><div class="text-gray-700 mt-0.5">' + escapeHtml(t.createTime || '—') + '</div></div>' +
                distributeBlock +
                '<div><span class="text-gray-400">生效时间</span><div class="text-gray-700 mt-0.5">' + escapeHtml(effectStr) + '</div></div>' +
                '<div><span class="text-gray-400">关联渠道</span><div class="text-gray-700 mt-0.5 break-words">' + escapeHtml(channelsStr) + '</div></div>' +
                '<div><span class="text-gray-400">上架状态</span><div class="text-gray-700 mt-0.5">' + shelfStatusBadge + '</div></div>' +
                '<div><span class="text-gray-400">生效状态</span><div class="text-gray-700 mt-0.5">' + effStatusBadge + '</div></div>' +
              '</div>' +
            '</div>' +
            storesSection +
            '<div class="relative flex-shrink-0 self-start">' +
              '<button type="button" class="more-btn p-2 rounded hover:bg-gray-100 text-gray-500" aria-label="更多">⋯</button>' +
              '<div class="dropdown-menu hidden absolute right-0 top-full mt-1 py-1 bg-white border border-gray-200 rounded-ant shadow-lg z-10 min-w-[120px]">' +
                dropdownInner +
              '</div>' +
            '</div>' +
          '</div>';
        }).join('');

        container.innerHTML = html;
        if (totalEl) totalEl.textContent = String(totalCount);

        renderPagination(totalCount, totalPages);

        container.querySelectorAll('.more-btn').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var menu = this.nextElementSibling;
            if (!menu || !menu.classList.contains('dropdown-menu')) return;
            container.querySelectorAll('.dropdown-menu').forEach(function(m) { m.classList.add('hidden'); });
            menu.classList.toggle('hidden');
          });
        });
        container.querySelectorAll('.delete-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var card = this.closest('.screensaver-card');
            var id = card && card.getAttribute('data-id');
            if (!id) return;
            container.querySelectorAll('.dropdown-menu').forEach(function(m) { m.classList.add('hidden'); });
            pendingDeleteThemeId = id;
            var titleEl = card.querySelector('h3');
            var nameText = titleEl ? titleEl.textContent.trim() : '';
            if (deleteConfirmThemeName) deleteConfirmThemeName.textContent = nameText || '未命名主题';
            openDeleteConfirmModal();
          });
        });
        container.querySelectorAll('.publish-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var id = this.getAttribute('data-theme-id');
            if (!id) return;
            container.querySelectorAll('.dropdown-menu').forEach(function(m) { m.classList.add('hidden'); });
            if (this.getAttribute('data-relist') === '1') {
              try { localStorage.setItem('current_theme_id_for_distribute', id); } catch (e) {}
              window.location.href = 'store-select.html?themeId=' + encodeURIComponent(id) + '&from=edit';
              return;
            }
            var themes = getThemes();
            var th = themes.find(function(x) { return x.id === id; });
            if (!th) return;
            var block = findShelfTimeConflictsForPublish(th, themes);
            if (block.kind === 'no_range') {
              openPublishBlockModal(block.message);
              return;
            }
            if (block.kind === 'overlap') {
              openPublishBlockModal(formatPublishOverlapMessage(block.conflicts, th));
              return;
            }
            th.publishStatus = 'published';
            saveThemes(themes);
            render();
          });
        });
        container.querySelectorAll('.unpublish-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var id = this.getAttribute('data-theme-id');
            if (!id) return;
            container.querySelectorAll('.dropdown-menu').forEach(function(m) { m.classList.add('hidden'); });
            var themes = getThemes();
            var th = themes.find(function(x) { return x.id === id; });
            if (!th) return;
            th.publishStatus = 'draft';
            saveThemes(themes);
            render();
          });
        });

        container.querySelectorAll('.preview-thumb').forEach(function(thumb) {
          thumb.addEventListener('click', function() {
            var themeId = this.getAttribute('data-theme-id');
            var imgType = this.getAttribute('data-img-type');
            var imgIndex = parseInt(this.getAttribute('data-img-index'), 10);
            openImagePreview(themeId, imgType, imgIndex);
          });
        });

        container.querySelectorAll('.view-stores-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var themeId = this.getAttribute('data-theme-id');
            openStoresModal(themeId);
          });
        });
        }

        if (window.KioskThemeMediaIdb && KioskThemeMediaIdb.supported()) {
          hydrateThemeListMedia(list).then(finalizeListRender).catch(finalizeListRender);
        } else {
          finalizeListRender();
        }
      }

      var previewModal = document.getElementById('imagePreviewModal');
      var previewImage = document.getElementById('previewImage');
      var previewVideo = document.getElementById('previewVideo');
      var previewCounter = document.getElementById('previewCounter');
      var previewTabPortrait = document.getElementById('previewTabPortrait');
      var previewTabLandscape = document.getElementById('previewTabLandscape');
      var previewOrientationSwitch = document.getElementById('previewOrientationSwitch');
      var previewPrev = document.getElementById('previewPrev');
      var previewNext = document.getElementById('previewNext');
      var previewClose = document.getElementById('previewClose');
      var currentPreviewSlides = [];
      var currentIndex = 0;
      var previewPortraitCount = 0;

      var previewTabActiveClass = 'bg-white text-gray-900 shadow-sm';
      var previewTabInactiveClass = 'text-white/85 hover:text-white hover:bg-white/10';

      /** 仅当主题同时有竖版与横版素材时展示 Tab，用于快捷切换版式 */
      function previewShowsOrientationTabs() {
        return previewPortraitCount > 0 && currentPreviewSlides.length > previewPortraitCount;
      }

      function updatePreviewOrientationTabs() {
        if (!previewTabPortrait || !previewTabLandscape || !currentPreviewSlides.length) return;
        if (!previewShowsOrientationTabs()) return;
        var hasPortrait = previewPortraitCount > 0;
        var hasLandscape = currentPreviewSlides.length > previewPortraitCount;
        var onPortrait = currentIndex < previewPortraitCount;
        previewTabPortrait.disabled = !hasPortrait;
        previewTabLandscape.disabled = !hasLandscape;
        previewTabPortrait.className = 'preview-orient-tab px-4 py-1.5 rounded-full text-sm font-medium transition-colors ' +
          (previewTabPortrait.disabled ? 'opacity-40 cursor-not-allowed ' : '') +
          (hasPortrait && onPortrait ? previewTabActiveClass : previewTabInactiveClass);
        previewTabLandscape.className = 'preview-orient-tab px-4 py-1.5 rounded-full text-sm font-medium transition-colors ' +
          (previewTabLandscape.disabled ? 'opacity-40 cursor-not-allowed ' : '') +
          (hasLandscape && !onPortrait ? previewTabActiveClass : previewTabInactiveClass);
        previewTabPortrait.setAttribute('aria-selected', hasPortrait && onPortrait ? 'true' : 'false');
        previewTabLandscape.setAttribute('aria-selected', hasLandscape && !onPortrait ? 'true' : 'false');
      }

      function buildPreviewSlides(theme) {
        var slides = [];
        var portrait = theme.portraitImages || [];
        var landscape = theme.landscapeImages || [];
        var pLen = portrait.length;
        var lLen = landscape.length;
        portrait.forEach(function(img, i) {
          slides.push({
            src: previewMediaSrc(img),
            kind: isPreviewVideoMedia(img) ? 'video' : 'image',
            orientation: '竖版',
            groupIndex: i + 1,
            groupCount: pLen
          });
        });
        landscape.forEach(function(img, i) {
          slides.push({
            src: previewMediaSrc(img),
            kind: isPreviewVideoMedia(img) ? 'video' : 'image',
            orientation: '横版',
            groupIndex: i + 1,
            groupCount: lLen
          });
        });
        return slides;
      }

      function openImagePreview(themeId, imgType, imgIndex) {
        var themes = getThemes();
        var theme = themes.find(function(t) { return t.id === themeId; });
        if (!theme) return;
        function openWithTheme(t) {
          var slides = buildPreviewSlides(t);
          if (!slides.length) return;
          var portraitLen = (t.portraitImages || []).length;
          var startGlobal = 0;
          if (imgType === 'portrait') {
            startGlobal = Math.min(Math.max(0, imgIndex), Math.max(0, portraitLen - 1));
          } else {
            startGlobal = portraitLen + Math.min(Math.max(0, imgIndex), Math.max(0, (t.landscapeImages || []).length - 1));
          }
          currentPreviewSlides = slides;
          previewPortraitCount = portraitLen;
          currentIndex = Math.min(startGlobal, slides.length - 1);
          updatePreview();
          previewModal.classList.remove('hidden');
        }
        hydrateThemeForPreview(theme).then(function() {
          openWithTheme(theme);
        });
      }

      function stopPreviewVideo() {
        if (!previewVideo) return;
        previewVideo.pause();
        previewVideo.removeAttribute('src');
        try {
          previewVideo.load();
        } catch (err) { /* ignore */ }
      }

      function syncPreviewMediaMargins(showOrientTabs) {
        var mt = showOrientTabs ? 'mt-10' : 'mt-4';
        [previewImage, previewVideo].forEach(function(el) {
          if (!el) return;
          el.classList.remove('mt-4', 'mt-10');
          el.classList.add(mt);
        });
      }

      function updatePreview() {
        if (!currentPreviewSlides.length) return;
        var slide = currentPreviewSlides[currentIndex];
        var total = currentPreviewSlides.length;
        var unit = slide.kind === 'video' ? '段' : '张';
        var sub = slide.groupCount > 0
          ? slide.orientation + ' 第 ' + slide.groupIndex + '/' + slide.groupCount + ' ' + unit
          : slide.orientation;
        previewCounter.textContent = (currentIndex + 1) + ' / ' + total + ' · ' + sub;
        var multi = currentPreviewSlides.length > 1;
        previewPrev.style.display = multi ? 'flex' : 'none';
        previewNext.style.display = multi ? 'flex' : 'none';
        var showOrientTabs = previewShowsOrientationTabs();
        if (previewOrientationSwitch) {
          if (showOrientTabs) {
            previewOrientationSwitch.classList.remove('hidden');
            previewOrientationSwitch.setAttribute('aria-hidden', 'false');
          } else {
            previewOrientationSwitch.classList.add('hidden');
            previewOrientationSwitch.setAttribute('aria-hidden', 'true');
          }
        }
        syncPreviewMediaMargins(showOrientTabs);
        if (slide.kind === 'video' && previewVideo) {
          previewImage.src = '';
          previewImage.classList.add('hidden');
          previewVideo.classList.remove('hidden');
          previewVideo.src = slide.src || '';
          previewVideo.load();
          var playAttempt = previewVideo.play();
          if (playAttempt && typeof playAttempt.catch === 'function') {
            playAttempt.catch(function() { /* 浏览器可能要求用户再点播放 */ });
          }
        } else {
          stopPreviewVideo();
          previewVideo.classList.add('hidden');
          previewImage.classList.remove('hidden');
          previewImage.src = slide.src || '';
        }
        updatePreviewOrientationTabs();
      }

      function closePreview() {
        previewModal.classList.add('hidden');
        stopPreviewVideo();
        if (previewVideo) previewVideo.classList.add('hidden');
        previewImage.src = '';
        previewImage.classList.remove('hidden');
        revokePreviewOpenBlobUrls();
        currentPreviewSlides = [];
        currentIndex = 0;
        previewPortraitCount = 0;
        if (previewOrientationSwitch) {
          previewOrientationSwitch.classList.remove('hidden');
          previewOrientationSwitch.removeAttribute('aria-hidden');
        }
        if (previewImage) {
          previewImage.classList.remove('mt-4');
          previewImage.classList.add('mt-10');
        }
        if (previewVideo) {
          previewVideo.classList.remove('mt-4');
          previewVideo.classList.add('mt-10');
        }
      }

      var previewBackdrop = document.getElementById('previewBackdrop');
      previewClose.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        closePreview();
      });
      if (previewBackdrop) {
        previewBackdrop.addEventListener('click', function(e) {
          e.preventDefault();
          closePreview();
        });
      }
      if (previewTabPortrait) {
        previewTabPortrait.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          if (previewPortraitCount < 1) return;
          currentIndex = 0;
          updatePreview();
        });
      }
      if (previewTabLandscape) {
        previewTabLandscape.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          if (currentPreviewSlides.length <= previewPortraitCount) return;
          currentIndex = previewPortraitCount;
          updatePreview();
        });
      }
      previewPrev.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        if (currentPreviewSlides.length <= 1) return;
        currentIndex = (currentIndex - 1 + currentPreviewSlides.length) % currentPreviewSlides.length;
        updatePreview();
      });
      previewNext.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        if (currentPreviewSlides.length <= 1) return;
        currentIndex = (currentIndex + 1) % currentPreviewSlides.length;
        updatePreview();
      });
      document.addEventListener('keydown', function(e) {
        if (previewModal.classList.contains('hidden')) return;
        if (e.key === 'Escape') closePreview();
        if (e.key === 'ArrowLeft' && currentPreviewSlides.length > 1) {
          currentIndex = (currentIndex - 1 + currentPreviewSlides.length) % currentPreviewSlides.length;
          updatePreview();
        }
        if (e.key === 'ArrowRight' && currentPreviewSlides.length > 1) {
          currentIndex = (currentIndex + 1) % currentPreviewSlides.length;
          updatePreview();
        }
      });

      document.addEventListener('click', function() {
        document.querySelectorAll('.dropdown-menu').forEach(function(m) { m.classList.add('hidden'); });
      });

      var storesModal = document.getElementById('storesModal');
      var storesModalClose = document.getElementById('storesModalClose');
      var storesListContainer = document.getElementById('storesListContainer');
      var storesTotalEl = document.getElementById('storesTotal');

      var currentModalThemeId = null;
      var storesMidSearchEl = document.getElementById('storesMidSearch');
      var storesFilterResetEl = document.getElementById('storesFilterReset');
      var storesFilteredHintEl = document.getElementById('storesFilteredHint');

      /**
       * 渠道「不展示 / 恢复展示」：云端 → Kiosk 执行 → Kiosk 回传执行结果 → 云端更新状态。
       * 产品：仅当云端收到 Kiosk 回传的「执行成功 / 执行失败」后，配置端才结束执行中或展示失败；
       * 若云端一直收不到回传，界面**一直执行中**（不因超时而自动判失败）。
       * 原型用确定性分支模拟：成功 / 设备执行失败（已同步云端）/ 长期无回传（仅演示）。
       */
      var channelDisplayOpTimers = {};

      function channelDisplayOpKey(themeId, mid, channelName) {
        return String(themeId) + '|' + String(mid || '') + '|' + String(channelName || '');
      }

      function cancelChannelDisplayOpTimer(key) {
        var t = channelDisplayOpTimers[key];
        if (!t) return;
        if (typeof t === 'object') {
          if (t.success != null) clearTimeout(t.success);
          if (t.execFail != null) clearTimeout(t.execFail);
          if (t.fail != null) clearTimeout(t.fail);
          if (t.ok != null) clearTimeout(t.ok);
        } else {
          clearTimeout(t);
        }
        delete channelDisplayOpTimers[key];
      }

      function cancelAllChannelDisplayOpTimersForTheme(themeId) {
        Object.keys(channelDisplayOpTimers).forEach(function(k) {
          if (k.indexOf(String(themeId) + '|') === 0) cancelChannelDisplayOpTimer(k);
        });
      }

      /** 与 startedAt 绑定，保证同一次 pending 在刷新后原型分支不变 */
      function channelDisplayDemoOutcome(themeId, mid, channelName, startedAt) {
        var s = String(themeId) + '\x1e' + String(mid) + '\x1e' + String(channelName) + '\x1e' + String(startedAt);
        var h = 0;
        for (var i = 0; i < s.length; i++) {
          h = ((h << 5) - h) + s.charCodeAt(i);
          h = h | 0;
        }
        var u = Math.abs(h) % 100;
        if (u < 40) return 'success';
        if (u < 68) return 'exec_fail';
        return 'stuck';
      }

      function findChannelCs(theme, mid, channelName) {
        if (!theme || !theme.distributedStores) return null;
        var store = theme.distributedStores.filter(function(s) { return String(s.mid) === String(mid); })[0];
        if (!store) return null;
        var cs = (store.channelStatuses || []).filter(function(c) { return String(c.channel || '') === String(channelName); })[0];
        if (!cs) return null;
        return { store: store, cs: cs };
      }

      function applyChannelDisplayOpSuccess(themeId, mid, channelName, action) {
        var themes = getThemes();
        var theme = themes.filter(function(t) { return t.id === themeId; })[0];
        var found = findChannelCs(theme, mid, channelName);
        if (!found) return;
        var store = found.store;
        var cs = found.cs;
        if (!cs.displaySync || cs.displaySync.state !== 'pending' || cs.displaySync.action !== action) return;
        delete cs.displaySync;
        if (action === 'hide') {
          cs.shelfStatus = 'off_shelf';
        } else {
          delete cs.shelfStatus;
          if (store.shelfStatus === 'off_shelf') delete store.shelfStatus;
        }
        saveThemes(themes);
        if (storesModal && storesModal.classList.contains('flex') && currentModalThemeId === themeId) {
          renderStoresModalList();
        }
        render();
      }

      /** Kiosk 执行失败且执行结果已到达云端 → 配置端展示失败，可重试 */
      function applyChannelDisplayOpExecFailure(themeId, mid, channelName, action) {
        var themes = getThemes();
        var theme = themes.filter(function(t) { return t.id === themeId; })[0];
        var found = findChannelCs(theme, mid, channelName);
        if (!found) return;
        var cs = found.cs;
        if (!cs.displaySync || cs.displaySync.state !== 'pending' || cs.displaySync.action !== action) return;
        cs.displaySync = { state: 'failed', action: action, reason: 'exec_failed' };
        saveThemes(themes);
        if (storesModal && storesModal.classList.contains('flex') && currentModalThemeId === themeId) {
          renderStoresModalList();
        }
        render();
      }

      /** 原型：按确定性分支挂载「成功」或「设备执行失败」计时器；无回传分支不挂载（一直执行中） */
      function armChannelDisplayOpTimers(themeId, mid, channelName, action) {
        var key = channelDisplayOpKey(themeId, mid, channelName);
        cancelChannelDisplayOpTimer(key);
        var themes = getThemes();
        var theme = themes.filter(function(t) { return t.id === themeId; })[0];
        var found = findChannelCs(theme, mid, channelName);
        if (!found || !found.cs.displaySync || found.cs.displaySync.state !== 'pending') return;
        var cs = found.cs;
        if (found.cs.displaySync.action !== action) return;
        if (typeof cs.displaySync.startedAt !== 'number') {
          cs.displaySync.startedAt = Date.now();
          saveThemes(themes);
        }
        var startedAt = cs.displaySync.startedAt;
        var outcome = channelDisplayDemoOutcome(themeId, mid, channelName, startedAt);
        var handles = {};
        if (outcome === 'stuck') {
          channelDisplayOpTimers[key] = handles;
          return;
        }
        if (outcome === 'success') {
          var d = 700 + Math.floor(Math.random() * 1800);
          handles.success = setTimeout(function() {
            cancelChannelDisplayOpTimer(key);
            applyChannelDisplayOpSuccess(themeId, mid, channelName, action);
          }, d);
        } else {
          var d2 = 800 + Math.floor(Math.random() * 1600);
          handles.execFail = setTimeout(function() {
            cancelChannelDisplayOpTimer(key);
            applyChannelDisplayOpExecFailure(themeId, mid, channelName, action);
          }, d2);
        }
        channelDisplayOpTimers[key] = handles;
      }

      /** 打开弹窗时：为仍为 pending 的渠道重新挂载原型计时器（刷新后内存丢失；无回传分支仍无计时器） */
      function resumePendingChannelDisplayOps(themeId) {
        var themes = getThemes();
        var theme = themes.filter(function(t) { return t.id === themeId; })[0];
        if (!theme || !theme.distributedStores) return;
        theme.distributedStores.forEach(function(store) {
          (store.channelStatuses || []).forEach(function(cs) {
            var ds = cs.displaySync;
            if (!ds || ds.state !== 'pending') return;
            var act = ds.action;
            if (act !== 'hide' && act !== 'show') return;
            armChannelDisplayOpTimers(themeId, store.mid, cs.channel, act);
          });
        });
      }

      /** 渠道当前为「不展示」：含 `channelStatuses[].shelfStatus === 'off_shelf'`，或旧数据门店级 `store.shelfStatus` */
      function channelIsOffShelf(store, cs) {
        if (!cs) return false;
        if (cs.shelfStatus === 'off_shelf') return true;
        if (store.shelfStatus === 'off_shelf') return true;
        return false;
      }

      /** 渠道当前为「已展示」（可点不展示）；执行中或等待重试时不可再点「不展示」 */
      function channelIsOnShelf(store, cs) {
        if (!cs) return false;
        var ds = cs.displaySync;
        if (ds && ds.state === 'pending') return false;
        return !channelIsOffShelf(store, cs);
      }

      function renderStoreChannelRows(store) {
        var arr = store.channelStatuses;
        if (!arr || !arr.length) return '';
        var midAttr = escapeHtml(String(store.mid || ''));
        var rows = arr.map(function(cs) {
          var chLabel = cs.channel != null && cs.channel !== '' ? String(cs.channel) : '—';
          var chNameAttr = escapeHtml(chLabel);
          var ds = cs.displaySync;
          var shelfHtml = '';
          if (ds && ds.state === 'pending') {
            var pendLabel = ds.action === 'hide'
              ? '执行中：Kiosk 已收云端指令，正在执行「不展示」'
              : '执行中：Kiosk 已收云端指令，正在执行「恢复展示」';
            shelfHtml = '<div class="flex flex-col items-end gap-1 mt-1">' +
              '<span class="text-xs text-amber-800 bg-amber-50 border border-amber-100 px-1.5 py-0.5 rounded">' + escapeHtml(pendLabel) + '</span>' +
              '<span class="text-[11px] text-gray-400">Kiosk 执行完成后回传云端；云端收到成功/失败后此处结束。若云端一直收不到回传，将一直保持本状态</span>' +
              '</div>';
          } else if (ds && ds.state === 'failed') {
            var failAct = ds.action === 'show' ? '恢复展示' : '不展示';
            var failLine = ds.reason === 'exec_failed'
              ? '「' + failAct + '」执行失败：Kiosk 执行未成功，结果已到达云端'
              : (ds.reason === 'timeout'
                ? '「' + failAct + '」失败（历史：曾按超时判定，建议重试）'
                : '「' + failAct + '」执行失败');
            var retryAction = ds.action === 'show' ? 'show' : 'hide';
            shelfHtml = '<div class="flex flex-col items-end gap-1 mt-1">' +
              '<span class="text-xs text-red-700 bg-red-50 border border-red-100 px-1.5 py-0.5 rounded">' + escapeHtml(failLine) + '</span>' +
              '<button type="button" data-channel-display-retry="' + escapeHtml(retryAction) + '" data-store-mid="' + midAttr + '" data-channel="' + chNameAttr + '" class="text-xs px-1.5 py-0.5 rounded-ant border border-primary text-primary hover:bg-blue-50">重试</button>' +
              '</div>';
          } else if (channelIsOffShelf(store, cs)) {
            shelfHtml = '<div class="flex flex-wrap items-center gap-1 mt-1 justify-end">' +
              '<span class="text-xs text-gray-600 bg-gray-100 px-1.5 py-0.5 rounded">已不展示</span>' +
              '<button type="button" data-channel-action="on_shelf" data-store-mid="' + midAttr + '" data-channel="' + chNameAttr + '" class="text-xs px-1.5 py-0.5 rounded-ant border border-gray-300 hover:bg-gray-100 text-gray-700">恢复展示</button>' +
              '</div>';
          } else {
            shelfHtml = '<div class="flex flex-wrap items-center gap-1 mt-1 justify-end">' +
              '<span class="text-xs text-green-700 bg-green-50 px-1.5 py-0.5 rounded border border-green-100">已展示</span>' +
              '<button type="button" data-channel-action="off_shelf" data-store-mid="' + midAttr + '" data-channel="' + chNameAttr + '" class="text-xs px-1.5 py-0.5 rounded-ant border border-gray-300 hover:bg-gray-100 text-gray-700">不展示</button>' +
              '</div>';
          }
          return '<div class="mt-1.5 pt-1.5 border-t border-gray-100 first:border-t-0 first:pt-0 first:mt-0">' +
            '<div class="flex items-center justify-between gap-2 text-xs">' +
            '<span class="text-gray-600 truncate pr-2 font-medium" title="' + chNameAttr + '">' + escapeHtml(chLabel) + '</span>' +
            '</div>' + shelfHtml + '</div>';
        }).join('');
        return '<div class="mt-2 pt-2 border-t border-gray-100"><div class="text-xs text-gray-400 mb-1">各关联渠道</div>' + rows + '</div>';
      }

      function renderStoreBatchActionRow(store) {
        var midAttr = escapeHtml(String(store.mid || ''));
        return '<div class="mt-2 pt-2 border-t border-gray-100 flex flex-wrap items-center justify-end gap-2">' +
          '<button type="button" data-store-batch-action="all_off_shelf" data-store-mid="' + midAttr + '" class="text-xs px-2 py-1 rounded-ant border border-gray-300 text-gray-700 hover:bg-gray-100">全渠道不展示</button>' +
          '<button type="button" data-store-batch-action="all_on_shelf" data-store-mid="' + midAttr + '" class="text-xs px-2 py-1 rounded-ant border border-primary text-primary hover:bg-blue-50">全渠道展示</button>' +
          '</div>';
      }

      function renderStoresModalList() {
        if (!currentModalThemeId || !storesListContainer) return;
        var themes = getThemes();
        var theme = themes.find(function(t) { return t.id === currentModalThemeId; });
        if (!theme || !theme.distributedStores) {
          storesListContainer.innerHTML = '';
          if (storesFilteredHintEl) storesFilteredHintEl.classList.add('hidden');
          return;
        }
        var stores = theme.distributedStores;
        var midQ = (storesMidSearchEl && storesMidSearchEl.value) ? storesMidSearchEl.value.trim().toLowerCase() : '';
        var filtered = stores.filter(function(s) {
          if (midQ && String(s.mid || '').toLowerCase().indexOf(midQ) < 0) return false;
          return true;
        });
        storesListContainer.innerHTML = filtered.length
          ? filtered.map(function(store) {
              var channelBlock = renderStoreChannelRows(store);
              var removeBlock = renderStoreBatchActionRow(store);
              return '<div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-2 p-3 bg-gray-50 rounded-ant">' +
                '<div class="flex-1 min-w-0">' +
                  '<div>' +
                    '<div class="font-medium text-gray-800">' + escapeHtml(store.name) + '</div>' +
                    '<div class="text-gray-500 text-xs mt-0.5">MID: ' + escapeHtml(store.mid) + '</div>' +
                  '</div>' +
                  channelBlock +
                  removeBlock +
                '</div>' +
              '</div>';
            }).join('')
          : '<p class="text-center text-sm text-gray-500 py-8 px-2">无匹配门店，请调整 MID 关键词</p>';
        if (storesFilteredHintEl) {
          if (filtered.length < stores.length || midQ) {
            storesFilteredHintEl.textContent = '当前显示 ' + filtered.length + ' / ' + stores.length + ' 家门店';
            storesFilteredHintEl.classList.remove('hidden');
          } else {
            storesFilteredHintEl.classList.add('hidden');
          }
        }
      }

      function openStoresModal(themeId) {
        var themes = getThemes();
        var theme = themes.find(function(t) { return t.id === themeId; });
        if (!theme || !theme.distributedStores) return;
        currentModalThemeId = themeId;
        if (storesMidSearchEl) storesMidSearchEl.value = '';
        var stores = theme.distributedStores;
        storesTotalEl.textContent = stores.length;
        renderStoresModalList();
        resumePendingChannelDisplayOps(themeId);
        storesModal.classList.remove('hidden');
        storesModal.classList.add('flex');
      }

      if (storesMidSearchEl) {
        storesMidSearchEl.addEventListener('input', function() {
          if (storesModal.classList.contains('flex')) renderStoresModalList();
        });
      }
      if (storesFilterResetEl) {
        storesFilterResetEl.addEventListener('click', function() {
          if (storesMidSearchEl) storesMidSearchEl.value = '';
          renderStoresModalList();
        });
      }

      function applyStoreBatchChannelAction(themeId, mid, action) {
        if (!themeId || !mid || (action !== 'hide' && action !== 'show')) return false;
        var themes = getThemes();
        var theme = themes.find(function(t) { return t.id === themeId; });
        if (!theme || !theme.distributedStores) return false;
        var store = theme.distributedStores.find(function(s) { return String(s.mid) === String(mid); });
        if (!store) return false;
        var arr = store.channelStatuses || [];
        if (!arr.length) return false;

        var now = Date.now();
        var hasValidChannel = false;
        arr.forEach(function(cs) {
          var channelName = cs && cs.channel != null ? String(cs.channel) : '';
          if (!channelName) return;
          hasValidChannel = true;
          cancelChannelDisplayOpTimer(channelDisplayOpKey(themeId, mid, channelName));
          cs.displaySync = { state: 'pending', action: action, startedAt: now };
        });
        if (!hasValidChannel) return false;

        saveThemes(themes);
        arr.forEach(function(cs) {
          var channelName = cs && cs.channel != null ? String(cs.channel) : '';
          if (!channelName) return;
          armChannelDisplayOpTimers(themeId, mid, channelName, action);
        });
        return true;
      }

      storesListContainer.addEventListener('click', function(e) {
        if (!storesModal.classList.contains('flex')) return;
        var chRetry = e.target.closest('[data-channel-display-retry]');
        if (chRetry) {
          e.stopPropagation();
          var rMid = chRetry.getAttribute('data-store-mid');
          var rCh = chRetry.getAttribute('data-channel');
          var rAct = chRetry.getAttribute('data-channel-display-retry');
          if (!rMid || !currentModalThemeId || rCh == null || rCh === '' || (rAct !== 'hide' && rAct !== 'show')) return;
          var themesR = getThemes();
          var themeR = themesR.find(function(t) { return t.id === currentModalThemeId; });
          if (!themeR || !themeR.distributedStores) return;
          var storeR = themeR.distributedStores.find(function(s) { return String(s.mid) === String(rMid); });
          if (!storeR) return;
          var csR = (storeR.channelStatuses || []).filter(function(c) { return String(c.channel || '') === String(rCh); })[0];
          if (!csR || !csR.displaySync || csR.displaySync.state !== 'failed' || csR.displaySync.action !== rAct) return;
          csR.displaySync = { state: 'pending', action: rAct, startedAt: Date.now() };
          saveThemes(themesR);
          armChannelDisplayOpTimers(currentModalThemeId, rMid, rCh, rAct);
          renderStoresModalList();
          render();
          return;
        }
        var chBtn = e.target.closest('[data-channel-action]');
        if (chBtn) {
          e.stopPropagation();
          var chAction = chBtn.getAttribute('data-channel-action');
          var midCh = chBtn.getAttribute('data-store-mid');
          var chName = chBtn.getAttribute('data-channel');
          if (!midCh || !currentModalThemeId || chName == null || chName === '') return;
          var themesCh = getThemes();
          var themeCh = themesCh.find(function(t) { return t.id === currentModalThemeId; });
          if (!themeCh || !themeCh.distributedStores) return;
          var storeCh = themeCh.distributedStores.find(function(s) { return String(s.mid) === String(midCh); });
          if (!storeCh) return;
          var arrCh = storeCh.channelStatuses || [];
          var cs = arrCh.filter(function(c) { return String(c.channel || '') === String(chName); })[0];
          if (!cs) return;
          if (chAction === 'off_shelf') {
            if (!channelIsOnShelf(storeCh, cs)) return;
            cs.displaySync = { state: 'pending', action: 'hide', startedAt: Date.now() };
            saveThemes(themesCh);
            armChannelDisplayOpTimers(currentModalThemeId, midCh, chName, 'hide');
            renderStoresModalList();
            render();
            return;
          }
          if (chAction === 'on_shelf') {
            if (!channelIsOffShelf(storeCh, cs)) return;
            cs.displaySync = { state: 'pending', action: 'show', startedAt: Date.now() };
            saveThemes(themesCh);
            armChannelDisplayOpTimers(currentModalThemeId, midCh, chName, 'show');
            renderStoresModalList();
            render();
            return;
          }
          return;
        }
        var btn = e.target.closest('[data-store-batch-action]');
        if (!btn) return;
        e.stopPropagation();
        var action = btn.getAttribute('data-store-batch-action');
        var mid = btn.getAttribute('data-store-mid');
        if (!mid || !currentModalThemeId) return;
        if (action === 'all_off_shelf') {
          if (!applyStoreBatchChannelAction(currentModalThemeId, mid, 'hide')) return;
          renderStoresModalList();
          render();
          return;
        }
        if (action === 'all_on_shelf') {
          if (!applyStoreBatchChannelAction(currentModalThemeId, mid, 'show')) return;
          renderStoresModalList();
          render();
          return;
        }
      });

      function closeStoresModal() {
        storesModal.classList.add('hidden');
        storesModal.classList.remove('flex');
      }

      storesModalClose.addEventListener('click', closeStoresModal);
      storesModal.addEventListener('click', function(e) {
        if (e.target === storesModal) closeStoresModal();
      });
      document.addEventListener('keydown', function(e) {
        if (e.key !== 'Escape') return;
        if (!storesModal.classList.contains('hidden')) closeStoresModal();
      });

      function renderPagination(totalCount, totalPages) {
        var prevBtn = document.getElementById('prevPageBtn');
        var nextBtn = document.getElementById('nextPageBtn');
        var pageNumbersEl = document.getElementById('pageNumbers');
        var pageSizeSelect = document.getElementById('pageSizeSelect');

        if (!prevBtn || !nextBtn || !pageNumbersEl) return;

        prevBtn.disabled = currentPage <= 1;
        nextBtn.disabled = currentPage >= totalPages;

        var pageHtml = '';
        var maxVisiblePages = 5;
        var startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
        var endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
        if (endPage - startPage + 1 < maxVisiblePages) {
          startPage = Math.max(1, endPage - maxVisiblePages + 1);
        }

        if (startPage > 1) {
          pageHtml += '<button type="button" class="page-num px-2 py-1 rounded hover:bg-gray-100 text-sm" data-page="1">1</button>';
          if (startPage > 2) {
            pageHtml += '<span class="px-1 text-gray-400">...</span>';
          }
        }

        for (var i = startPage; i <= endPage; i++) {
          if (i === currentPage) {
            pageHtml += '<button type="button" class="page-num px-2 py-1 rounded bg-primary text-white text-sm" data-page="' + i + '">' + i + '</button>';
          } else {
            pageHtml += '<button type="button" class="page-num px-2 py-1 rounded hover:bg-gray-100 text-sm" data-page="' + i + '">' + i + '</button>';
          }
        }

        if (endPage < totalPages) {
          if (endPage < totalPages - 1) {
            pageHtml += '<span class="px-1 text-gray-400">...</span>';
          }
          pageHtml += '<button type="button" class="page-num px-2 py-1 rounded hover:bg-gray-100 text-sm" data-page="' + totalPages + '">' + totalPages + '</button>';
        }

        pageNumbersEl.innerHTML = pageHtml;

        pageNumbersEl.querySelectorAll('.page-num').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var page = parseInt(this.getAttribute('data-page'), 10);
            if (page !== currentPage) {
              currentPage = page;
              render();
            }
          });
        });
      }

      document.getElementById('prevPageBtn').addEventListener('click', function() {
        if (currentPage > 1) {
          currentPage--;
          render();
        }
      });

      document.getElementById('nextPageBtn').addEventListener('click', function() {
        var themes = getThemes();
        var totalPages = Math.ceil(themes.length / pageSize) || 1;
        if (currentPage < totalPages) {
          currentPage++;
          render();
        }
      });

      document.getElementById('pageSizeSelect').addEventListener('change', function() {
        pageSize = parseInt(this.value, 10);
        currentPage = 1;
        render();
      });

      document.getElementById('filterName').addEventListener('input', function() {
        currentPage = 1;
        render();
      });

      document.getElementById('filterEffectStatus').addEventListener('change', function() {
        currentPage = 1;
        render();
      });

      document.getElementById('filterStartDate').addEventListener('change', function() {
        currentPage = 1;
        render();
      });

      document.getElementById('filterEndDate').addEventListener('change', function() {
        currentPage = 1;
        render();
      });

      document.getElementById('filterResetBtn').addEventListener('click', function() {
        document.getElementById('filterName').value = '';
        document.getElementById('filterEffectStatus').value = '';
        document.getElementById('filterStartDate').value = '';
        document.getElementById('filterEndDate').value = '';
        currentPage = 1;
        render();
      });

      if (deleteConfirmCancel) {
        deleteConfirmCancel.addEventListener('click', closeDeleteConfirmModal);
      }
      if (deleteConfirmOk) {
        deleteConfirmOk.addEventListener('click', executeDeleteTheme);
      }
      if (deleteConfirmModal) {
        deleteConfirmModal.addEventListener('click', function(e) {
          if (e.target === deleteConfirmModal) closeDeleteConfirmModal();
        });
      }
      if (publishBlockOk) {
        publishBlockOk.addEventListener('click', closePublishBlockModal);
      }
      if (publishBlockModal) {
        publishBlockModal.addEventListener('click', function(e) {
          if (e.target === publishBlockModal) closePublishBlockModal();
        });
      }
      document.addEventListener('keydown', function(e) {
        if (e.key !== 'Escape') return;
        if (deleteConfirmModal && !deleteConfirmModal.classList.contains('hidden')) {
          e.preventDefault();
          closeDeleteConfirmModal();
          return;
        }
        if (publishBlockModal && !publishBlockModal.classList.contains('hidden')) {
          e.preventDefault();
          closePublishBlockModal();
        }
      });

      render();
    })();
  </script>
</body>
</html>
