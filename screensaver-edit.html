<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>编辑主题 - 屏保</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/common.css" />
  <script src="assets/toast.js"></script>
  <script src="assets/kiosk-theme-media-idb.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#1677ff', 'sidebar-bg': '#fafafa', 'sidebar-active': '#e6f4ff' }, borderRadius: { ant: '6px' } } } };
  </script>
  <style>
    .create-type-toggle { display: inline-flex; gap: 2px; padding: 4px; border-radius: 12px; background: #f5f5f5; }
    .create-type-toggle label { cursor: pointer; display: inline-flex; align-items: center; margin: 0; }
    .create-type-toggle label span {
      display: inline-block; padding: 8px 18px; border-radius: 10px; font-size: 14px; line-height: 22px;
      color: rgba(0, 0, 0, 0.65); transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
    }
    .create-type-toggle input { position: absolute; opacity: 0; width: 0; height: 0; margin: 0; }
    .create-type-toggle input:focus-visible + span { outline: 2px solid #1677ff; outline-offset: 1px; }
    .create-type-toggle input:checked + span {
      background: #fff; color: rgba(0, 0, 0, 0.88); font-weight: 500;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03), 0 1px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02);
    }
  </style>
</head>
<body class="min-h-screen bg-[#f5f6f7] text-gray-900 antialiased">
  <div class="flex min-h-screen flex-col">
    <header class="flex-shrink-0 border-b border-[#f0f0f0] bg-white">
      <div class="flex items-center justify-between gap-4 px-6 py-4">
        <div class="flex min-w-0 flex-1 items-center gap-4">
          <button type="button" id="editBackBtn" class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-black/[0.04] text-[rgba(0,0,0,0.45)] hover:bg-black/[0.08] focus:outline-none focus-visible:ring-2 focus-visible:ring-primary" aria-label="返回">
            <svg width="20" height="20" viewBox="0 0 1024 1024" fill="currentColor" aria-hidden="true"><path d="M872 474H298.7l413.1-413.1c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L201.4 479.7c-6.2 6.2-9.4 14.4-9.4 22.6s3.1 16.4 9.4 22.6l465.1 465.1c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L298.7 550H872c17.7 0 32-14.3 32-32s-14.3-32-32-32z"/></svg>
          </button>
          <h1 class="truncate text-xl font-semibold leading-7 text-[rgba(0,0,0,0.88)]">编辑主题</h1>
        </div>
        <button type="button" id="editNextStepBtn" class="inline-flex h-12 shrink-0 items-center justify-center rounded-xl bg-primary px-5 text-base font-medium text-white shadow-[0_2px_0_rgba(5,145,255,0.1)] hover:bg-[#4096ff] focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">选择门店</button>
      </div>
      <div class="step-progress h-1 w-full rounded-none bg-[#f0f0f0]">
        <div class="step-progress-inner h-full rounded-none" style="width: 25%"></div>
      </div>
    </header>
    <main class="flex-1 min-h-0 overflow-auto p-6">
      <form id="editForm" class="mx-auto w-full max-w-[880px]">
        <div class="space-y-8 rounded-2xl border border-[#f0f0f0] bg-white p-6 shadow-[0_1px_2px_rgba(0,0,0,0.03)] lg:p-8">
        <input type="hidden" id="editThemeId" name="id" value="" />
        <div>
          <label for="editThemeName" class="mb-2 block text-sm font-normal leading-[22px] text-[rgba(0,0,0,0.65)]">主题名称</label>
          <input type="text" id="editThemeName" name="name" required placeholder="请输入主题名称" class="h-12 w-full rounded-xl border border-[#d9d9d9] bg-white px-4 text-base leading-6 text-[rgba(0,0,0,0.88)] placeholder:text-[rgba(0,0,0,0.25)] focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary" />
        </div>
        <div class="grid grid-cols-1 gap-6 md:grid-cols-3 md:gap-5">
          <div>
            <label for="editIdleTimeoutInput" class="mb-2 block text-sm font-normal leading-[22px] text-[rgba(0,0,0,0.65)]">无操作进入屏保时间</label>
            <div class="flex items-center gap-2">
              <input id="editIdleTimeoutInput" type="number" min="1" step="1" value="60" class="h-12 min-w-0 flex-1 rounded-xl border border-[#d9d9d9] bg-white px-4 text-base leading-6 text-[rgba(0,0,0,0.88)] focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary" />
              <span class="shrink-0 text-sm leading-[22px] text-[rgba(0,0,0,0.65)]">秒</span>
            </div>
          </div>
          <div>
            <label for="editTransitionEffectSelect" class="mb-2 block text-sm font-normal leading-[22px] text-[rgba(0,0,0,0.65)]">图片切换效果</label>
            <div class="relative">
              <select id="editTransitionEffectSelect" class="ui-select w-full hidden" aria-label="图片切换效果">
                <option value="slide">slide</option>
                <option value="fade">fade</option>
                <option value="zoom">zoom</option>
                <option value="rotate">rotate</option>
                <option value="bounce">bounce</option>
                <option value="flip">flip</option>
              </select>
              <button type="button" id="editTransitionEffectTrigger" class="ui-select-trigger" aria-haspopup="listbox" aria-expanded="false">
                <span class="ui-select-trigger__label" id="editTransitionEffectLabel">slide</span>
                <svg class="ui-select-trigger__chev" viewBox="0 0 1024 1024" fill="currentColor" aria-hidden="true"><path d="M884 256h-75c-5.1 0-9.9 2.5-12.6 6.5L512 654.2 227.9 262.6c-2.7-4-7.5-6.5-12.6-6.5h-75c-6.5 0-10.3 7.4-6.5 12.7l352.6 486.1c12.8 17.6 39 17.6 51.7 0l352.6-486.1c3.9-5.3.1-12.7-6.4-12.7z"/></svg>
              </button>
              <div id="editTransitionEffectMenu" class="ui-select-menu dropdown-menu theme-list-dropdown-menu ui-action-dropdown absolute left-0 top-[calc(100%+8px)] z-20 hidden bg-white" role="listbox" aria-label="图片切换效果选项">
                <button type="button" class="ui-menu-item" role="option" data-value="slide" aria-selected="true">slide</button>
                <button type="button" class="ui-menu-item" role="option" data-value="fade" aria-selected="false">fade</button>
                <button type="button" class="ui-menu-item" role="option" data-value="zoom" aria-selected="false">zoom</button>
                <button type="button" class="ui-menu-item" role="option" data-value="rotate" aria-selected="false">rotate</button>
                <button type="button" class="ui-menu-item" role="option" data-value="bounce" aria-selected="false">bounce</button>
                <button type="button" class="ui-menu-item" role="option" data-value="flip" aria-selected="false">flip</button>
              </div>
            </div>
          </div>
          <div>
            <label for="editCarouselIntervalInput" class="mb-2 block text-sm font-normal leading-[22px] text-[rgba(0,0,0,0.65)]">图片轮播时间间隔</label>
            <div class="flex items-center gap-2">
              <input id="editCarouselIntervalInput" type="number" min="1" step="1" value="3" class="h-12 min-w-0 flex-1 rounded-xl border border-[#d9d9d9] bg-white px-4 text-base leading-6 text-[rgba(0,0,0,0.88)] focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary" />
              <span class="shrink-0 text-sm leading-[22px] text-[rgba(0,0,0,0.65)]">秒</span>
            </div>
          </div>
        </div>
        <div class="border-t border-[#f0f0f0] pt-8">
          <div class="mb-3 flex flex-wrap items-baseline gap-2">
            <span class="text-base font-medium leading-6 text-[rgba(0,0,0,0.88)]">竖版</span>
            <span class="text-sm font-normal leading-[22px] text-[rgba(0,0,0,0.45)]">建议比例 9∶16</span>
          </div>
          <div class="create-type-toggle mb-4" role="radiogroup" aria-label="竖版素材类型">
            <label><input type="radio" name="portraitType" value="image" checked /><span>图片</span></label>
            <label><input type="radio" name="portraitType" value="video" /><span>视频</span></label>
          </div>
          <input type="file" id="filePortrait" accept="image/*" multiple class="hidden" />
          <div class="flex flex-wrap items-start gap-4">
            <div id="portraitPreviews" class="flex flex-wrap gap-3"></div>
            <div id="portraitHints" class="max-w-xs flex-shrink-0 space-y-1 rounded-xl bg-[#fafafa] px-4 py-3 text-xs leading-5 text-[rgba(0,0,0,0.45)]"></div>
          </div>
        </div>
        <div class="border-t border-[#f0f0f0] pt-8">
          <div class="mb-3 flex flex-wrap items-baseline gap-2">
            <span class="text-base font-medium leading-6 text-[rgba(0,0,0,0.88)]">横版</span>
            <span class="text-sm font-normal leading-[22px] text-[rgba(0,0,0,0.45)]">建议比例 16∶9</span>
          </div>
          <div class="create-type-toggle mb-4" role="radiogroup" aria-label="横版素材类型">
            <label><input type="radio" name="landscapeType" value="image" checked /><span>图片</span></label>
            <label><input type="radio" name="landscapeType" value="video" /><span>视频</span></label>
          </div>
          <input type="file" id="fileLandscape" accept="image/*" multiple class="hidden" />
          <div class="flex flex-wrap items-start gap-4">
            <div id="landscapePreviews" class="flex flex-wrap gap-3"></div>
            <div id="landscapeHints" class="max-w-xs flex-shrink-0 space-y-1 rounded-xl bg-[#fafafa] px-4 py-3 text-xs leading-5 text-[rgba(0,0,0,0.45)]"></div>
          </div>
        </div>
        </div>
      </form>
    </main>
  </div>
  <!-- 编辑返回列表确认 -->
  <div id="editBackConfirmModal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/[0.45] p-4" aria-hidden="true">
    <div class="ui-dialog-panel w-full max-w-sm overflow-hidden" role="dialog" aria-modal="true" aria-labelledby="editBackConfirmTitle">
      <div class="ui-dialog-header">
        <h3 id="editBackConfirmTitle" class="ui-dialog-title">返回提示</h3>
      </div>
      <p class="ui-dialog-body leading-relaxed">确定返回屏保列表吗？当前编辑内容将不会保存。</p>
      <div class="ui-dialog-footer">
        <button type="button" id="editBackConfirmCancel" class="ui-dialog-btn">取消</button>
        <button type="button" id="editBackConfirmOk" class="ui-dialog-btn ui-dialog-btn--primary">确定返回</button>
      </div>
    </div>
  </div>
  <!-- 上传来源选择模态框 -->
  <div id="uploadSourceModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/[0.45] p-4">
    <div class="ui-dialog-panel w-full max-w-sm overflow-hidden">
      <div class="ui-dialog-header-row">
        <h3 class="ui-dialog-title">选择上传方式</h3>
        <button type="button" id="uploadSourceClose" class="ui-dialog-close" aria-label="关闭">×</button>
      </div>
      <div class="space-y-3 p-5">
        <div class="overflow-hidden rounded-xl border border-[#d9d9d9] transition-colors hover:border-primary">
          <button type="button" id="chooseLocalBtn" class="w-full rounded-t-xl p-4 text-left transition-colors hover:bg-[#e6f4ff]/50">
            <div class="flex items-center gap-3">
              <span class="text-2xl">📁</span>
              <div>
                <div class="font-medium text-[rgba(0,0,0,0.88)]">本地上传</div>
                <div class="text-sm text-[rgba(0,0,0,0.45)]">从电脑选择文件上传</div>
              </div>
            </div>
          </button>
          <div id="saveToLibraryWrap" class="hidden rounded-b-xl border-t border-[#f0f0f0] bg-[#fafafa] px-4 py-3">
            <label class="flex cursor-pointer items-center gap-2" onclick="event.stopPropagation();">
              <input type="checkbox" id="saveToLibraryCheck" class="rounded text-primary" />
              <span class="text-sm text-[rgba(0,0,0,0.65)]">同时保存到图片素材库</span>
            </label>
          </div>
        </div>
        <button type="button" id="chooseMaterialBtn" class="w-full rounded-xl border border-[#d9d9d9] p-4 text-left transition-colors hover:border-primary hover:bg-[#e6f4ff]/50">
          <div class="flex items-center gap-3">
            <span class="text-2xl">🖼️</span>
            <div>
              <div class="font-medium text-[rgba(0,0,0,0.88)]">素材库选择</div>
              <div class="text-sm text-[rgba(0,0,0,0.45)]">从图片素材库中选择</div>
            </div>
          </div>
        </button>
      </div>
    </div>
  </div>
  <!-- 素材库选择模态框 -->
  <div id="materialLibraryModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/[0.45] p-4">
    <div class="ui-dialog-panel flex max-h-[80vh] w-full max-w-2xl flex-col overflow-hidden">
      <div class="ui-dialog-header-row flex-shrink-0">
        <h3 class="ui-dialog-title">选择素材</h3>
        <button type="button" id="materialLibraryClose" class="ui-dialog-close" aria-label="关闭">×</button>
      </div>
      <div class="flex min-h-0 flex-1">
        <div class="w-40 shrink-0 overflow-auto border-r border-[#f0f0f0] p-3">
          <div id="materialCategoryList" class="space-y-1"></div>
        </div>
        <div class="min-h-0 flex-1 overflow-auto p-4">
          <div id="materialImageGrid" class="grid grid-cols-3 gap-4"></div>
          <div id="materialEmptyState" class="hidden py-12 text-center text-[rgba(0,0,0,0.45)]">
            <div class="mb-2 text-4xl">📭</div>
            <p>该分类暂无素材</p>
            <p class="mt-2 text-sm">请先在<a href="material.html" class="text-primary hover:underline">图片素材</a>中上传素材</p>
          </div>
        </div>
      </div>
      <div class="ui-dialog-footer ui-dialog-footer--spread flex-shrink-0">
        <span class="text-sm text-[rgba(0,0,0,0.45)]">已选择 <span id="selectedMaterialCount" class="font-medium text-[rgba(0,0,0,0.88)]">0</span> 个素材</span>
        <div class="flex gap-2">
          <button type="button" id="materialCancelBtn" class="ui-dialog-btn">取消</button>
          <button type="button" id="materialConfirmBtn" class="ui-dialog-btn ui-dialog-btn--primary">确定</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var STORAGE_KEY = 'kiosk_themes';
      var params = new URLSearchParams(location.search);
      var id = params.get('id');
      var portraitList = [];
      var landscapeList = [];
      var currentUploadRole = null;
      var selectedMaterials = [];
      var currentMaterialCategory = null;

      function setupEditTransitionEffectDropdown() {
        var selectEl = document.getElementById('editTransitionEffectSelect');
        var trigger = document.getElementById('editTransitionEffectTrigger');
        var label = document.getElementById('editTransitionEffectLabel');
        var menu = document.getElementById('editTransitionEffectMenu');
        if (!selectEl || !trigger || !label || !menu) return;

        function closeMenu() {
          menu.classList.add('hidden');
          trigger.setAttribute('aria-expanded', 'false');
        }
        function syncFromSelect() {
          var v = selectEl.value || 'slide';
          selectEl.value = v;
          label.textContent = v;
          menu.querySelectorAll('[role=\"option\"]').forEach(function(opt) {
            opt.setAttribute('aria-selected', opt.getAttribute('data-value') === v ? 'true' : 'false');
          });
        }

        syncFromSelect();

        trigger.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          var willOpen = menu.classList.contains('hidden');
          document.querySelectorAll('.dropdown-menu').forEach(function(m) { m.classList.add('hidden'); });
          if (willOpen) {
            menu.classList.remove('hidden');
            trigger.setAttribute('aria-expanded', 'true');
          } else {
            closeMenu();
          }
        });

        menu.addEventListener('click', function(e) {
          var btn = e.target.closest('[role=\"option\"][data-value]');
          if (!btn) return;
          e.preventDefault();
          e.stopPropagation();
          selectEl.value = btn.getAttribute('data-value') || 'slide';
          syncFromSelect();
          closeMenu();
        });

        document.addEventListener('click', function(e) {
          if (e.target.closest('#editTransitionEffectTrigger') || e.target.closest('#editTransitionEffectMenu')) return;
          closeMenu();
        });

        document.addEventListener('keydown', function(e) {
          if (menu.classList.contains('hidden')) return;
          if (e.key === 'Escape') {
            e.preventDefault();
            closeMenu();
          }
        });

        window.__syncEditTransitionEffectDropdown = syncFromSelect;
      }

      function getThemes() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (e) {
          return [];
        }
      }

      function saveThemes(list) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
      }

      if (!id) {
        window.location.href = 'kiosk-theme-list.html';
        throw new Error('missing id');
      }

      var list = getThemes();
      var theme = list.find(function(t) { return t.id === id; });
      if (!theme) {
        window.location.href = 'kiosk-theme-list.html';
        throw new Error('theme not found');
      }

      var editBackBtn = document.getElementById('editBackBtn');
      var editBackConfirmModal = document.getElementById('editBackConfirmModal');
      var editBackConfirmOk = document.getElementById('editBackConfirmOk');
      var editBackConfirmCancel = document.getElementById('editBackConfirmCancel');

      function openEditBackConfirmModal() {
        if (!editBackConfirmModal) return;
        editBackConfirmModal.classList.remove('hidden');
        editBackConfirmModal.classList.add('flex');
        editBackConfirmModal.setAttribute('aria-hidden', 'false');
        if (editBackConfirmOk) editBackConfirmOk.focus();
      }

      function closeEditBackConfirmModal() {
        if (!editBackConfirmModal) return;
        editBackConfirmModal.classList.add('hidden');
        editBackConfirmModal.classList.remove('flex');
        editBackConfirmModal.setAttribute('aria-hidden', 'true');
      }

      function backToThemeListFromEdit() {
        window.location.href = 'kiosk-theme-list.html';
      }

      setupEditTransitionEffectDropdown();

      document.getElementById('editThemeId').value = theme.id;
      document.getElementById('editThemeName').value = theme.name || '';
      document.getElementById('editIdleTimeoutInput').value = theme.idleTimeoutSec || 60;
      document.getElementById('editTransitionEffectSelect').value = theme.transitionEffect || 'slide';
      if (window.__syncEditTransitionEffectDropdown) window.__syncEditTransitionEffectDropdown();
      document.getElementById('editCarouselIntervalInput').value = theme.carouselIntervalSec || 3;

      function buildListFromStoredMedia(images) {
        if (!images || !images.length) return Promise.resolve([]);
        var idb = window.KioskThemeMediaIdb;
        return Promise.all(images.map(function(img) {
          if (typeof img === 'object' && img.type === 'video' && img.mediaRef && idb && idb.supported()) {
            return idb.get(img.mediaRef).then(function(blob) {
              if (!blob) {
                return { url: '', dataUrl: null, type: 'video', mediaRef: img.mediaRef };
              }
              var url = URL.createObjectURL(blob);
              return { url: url, dataUrl: null, type: 'video', mediaRef: img.mediaRef };
            });
          }
          var dataUrl = typeof img === 'string' ? img : (img.dataUrl || '');
          var t = (typeof img === 'object' && img.type) ? img.type : 'image';
          return Promise.resolve({ url: dataUrl, dataUrl: dataUrl, type: t || 'image' });
        }));
      }

      function syncTypeRadiosFromLists() {
        ['portrait', 'landscape'].forEach(function(role) {
          var list = role === 'portrait' ? portraitList : landscapeList;
          var isVideo = list.length > 0 && list[0].type === 'video';
          var name = role === 'portrait' ? 'portraitType' : 'landscapeType';
          document.querySelectorAll('input[name="' + name + '"]').forEach(function(r) {
            r.checked = (r.value === 'video') === isVideo;
          });
        });
      }

      function getMediaType(role) {
        var radioName = role === 'portrait' ? 'portraitType' : 'landscapeType';
        var checked = document.querySelector('input[name="' + radioName + '"]:checked');
        return checked ? checked.value : 'image';
      }

      function getMaxCount(role) {
        return getMediaType(role) === 'video' ? 1 : 5;
      }

      function updateHints(role) {
        var hintsId = role === 'portrait' ? 'portraitHints' : 'landscapeHints';
        var container = document.getElementById(hintsId);
        var mediaType = getMediaType(role);
        var isPortrait = role === 'portrait';
        var size = isPortrait ? '1080*1920px' : '1920*1080px';
        var html = '<p class="leading-5">建议尺寸: ' + size + '</p>';
        if (mediaType === 'video') {
          html += '<p class="leading-5">视频格式: MP4、AVI 等主流格式</p>';
          html += '<p class="leading-5">视频大小不超过 20MB，最多 1 个</p>';
        } else {
          html += '<p class="leading-5">图片格式: JPEG、PNG、JPG、GIF</p>';
          html += '<p class="leading-5">图片大小建议 1M 以内，最多 5 张</p>';
        }
        container.innerHTML = html;
      }

      function updateAccept(role) {
        var inputId = role === 'portrait' ? 'filePortrait' : 'fileLandscape';
        var input = document.getElementById(inputId);
        var type = getMediaType(role);
        input.accept = type === 'video' ? 'video/*' : 'image/*';
        input.multiple = type !== 'video';
      }

      function renderPreviews(role) {
        var list = role === 'portrait' ? portraitList : landscapeList;
        var containerId = role === 'portrait' ? 'portraitPreviews' : 'landscapePreviews';
        var inputId = role === 'portrait' ? 'filePortrait' : 'fileLandscape';
        var container = document.getElementById(containerId);
        var input = document.getElementById(inputId);
        var isPortrait = role === 'portrait';
        /* 设备比例：竖版 1080×1920 = 9:16，横版 1920×1080 = 16:9 */
        var boxClass = isPortrait ? 'w-[5.625rem] aspect-[9/16]' : 'w-[10rem] aspect-video';
        var canDrag = list.length > 1;
        var maxCount = getMaxCount(role);
        var html = '';
        list.forEach(function(item, index) {
          var mediaSrc = item.url || item.dataUrl || '';
          var mediaHtml = '';
          if (item.type === 'video') {
            mediaHtml = '<video src="' + mediaSrc + '" class="w-full h-full object-cover muted" draggable="false"></video>' +
              '<div class="absolute inset-0 flex items-center justify-center pointer-events-none"><span class="w-8 h-8 bg-black/50 rounded-full flex items-center justify-center text-white text-xs">▶</span></div>';
          } else {
            mediaHtml = '<img src="' + mediaSrc + '" alt="预览" class="w-full h-full object-cover pointer-events-none" draggable="false" />';
          }

        for (var i = 0; i < files.length && list.length < maxCount; i++) {
          var file = files[i];
          if (mediaType === 'video') {
            if (!file.type || !file.type.startsWith('video/')) continue;

      function compressImage(file, maxWidth, maxHeight, quality) {
        return new Promise(function(resolve, reject) {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement('canvas');
            var w = img.width;
            var h = img.height;
            if (w > maxWidth) { h = h * maxWidth / w; w = maxWidth; }
            if (h > maxHeight) { w = w * maxHeight / h; h = maxHeight; }
            canvas.width = w;
            canvas.height = h;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            var dataUrl = canvas.toDataURL('image/jpeg', quality);
            URL.revokeObjectURL(img.src);
            resolve(dataUrl);
          };
          img.onerror = reject;
          img.src = URL.createObjectURL(file);
        });
      }

      function fileToDataUrl(file) {
        return new Promise(function(resolve, reject) {
          var reader = new FileReader();
          reader.onload = function() { resolve(reader.result); };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function processMedia(item, isPortrait) {
        if (item.type === 'video' && item.mediaRef && !item.file) {
          return Promise.resolve({ type: 'video', mediaRef: item.mediaRef });
        }
        if (item.dataUrl && !item.file) {
          if (item.type === 'video' && window.KioskThemeMediaIdb && KioskThemeMediaIdb.supported() && typeof item.dataUrl === 'string' && item.dataUrl.indexOf('data:video') === 0) {
            return fetch(item.dataUrl).then(function(r) { return r.blob(); }).then(function(blob) {
              var ref = KioskThemeMediaIdb.newMediaId();
              return KioskThemeMediaIdb.put(ref, blob).then(function() {
                return { type: 'video', mediaRef: ref };
              });
            });
          }
          return Promise.resolve({ dataUrl: item.dataUrl, type: item.type || 'image' });
        }
        if (!item.file) return Promise.resolve({ dataUrl: item.url, type: item.type || 'image' });
        if (item.type === 'video') {
          if (window.KioskThemeMediaIdb && KioskThemeMediaIdb.supported()) {
            var refNew = KioskThemeMediaIdb.newMediaId();
            return KioskThemeMediaIdb.put(refNew, item.file).then(function() {
              var oldRef = item.mediaRef;
              if (oldRef && oldRef !== refNew) {
                return KioskThemeMediaIdb.del(oldRef).catch(function() {}).then(function() {
                  return { type: 'video', mediaRef: refNew };
                });
              }
              return { type: 'video', mediaRef: refNew };
            });
          }
          return fileToDataUrl(item.file).then(function(dataUrl) {
            return { dataUrl: dataUrl, type: 'video' };
          });
        }
        var maxW = isPortrait ? 540 : 960;
        var maxH = isPortrait ? 960 : 540;
        return compressImage(item.file, maxW, maxH, 0.7).then(function(dataUrl) {
          return { dataUrl: dataUrl, type: 'image' };
        });
      }

      function saveEditedThemeAndRedirect(redirectUrl, opts) {
        opts = opts || {};
        var saveAsDraft = !!opts.saveAsDraft;
        var name = document.getElementById('editThemeName').value.trim();
        var idleRaw = String(document.getElementById('editIdleTimeoutInput').value).trim();
        var idleTimeoutSec = parseInt(idleRaw, 10);
        var transitionEffect = document.getElementById('editTransitionEffectSelect').value || 'slide';
        var carouselRaw = String(document.getElementById('editCarouselIntervalInput').value).trim();
        var carouselIntervalSec = parseInt(carouselRaw, 10);
        if (!name) {
          Toast.validate('请输入主题名称');
          return;
        }
        if (idleRaw === '' || isNaN(idleTimeoutSec) || idleTimeoutSec < 1) {
          Toast.validate('请输入无操作进入屏保时间');
          return;
        }
        if (carouselRaw === '' || isNaN(carouselIntervalSec) || carouselIntervalSec < 1) {
          Toast.validate('请输入图片轮播时间间隔');
          return;
        }
        if (portraitList.length === 0 && landscapeList.length === 0) {
          Toast.validate('请至少上传一个竖版或横版的屏保素材');
          return;
        }

        function runPersistEditedThemeAndRedirect() {
          var portraitPromises = portraitList.map(function(item) {
            return processMedia(item, true);
          });
          var landscapePromises = landscapeList.map(function(item) {
            return processMedia(item, false);
          });
          Promise.all([].concat(portraitPromises, landscapePromises)).then(function(allMedia) {
            var pLen = portraitList.length;
            var portraitImages = allMedia.slice(0, pLen);
            var landscapeImages = allMedia.slice(pLen, pLen + landscapeList.length);
            try {
              var list = getThemes();
              var idx = list.findIndex(function(t) { return t.id === id; });
              if (idx >= 0) {
                list[idx].name = name;
                list[idx].publishStatus = saveAsDraft ? 'draft' : 'published';
                list[idx].idleTimeoutSec = idleTimeoutSec;
                list[idx].transitionEffect = transitionEffect;
                list[idx].carouselIntervalSec = carouselIntervalSec;
                list[idx].portraitImages = portraitImages;
                list[idx].landscapeImages = landscapeImages;
                saveThemes(list);
              }
              if (!saveAsDraft) {
                try { localStorage.setItem('current_theme_id_for_distribute', id); } catch (e) {}
              } else {
                try { localStorage.removeItem('current_theme_id_for_distribute'); } catch (e1) {}
                try { localStorage.removeItem('selected_stores_for_distribute'); } catch (e2) {}
                try { localStorage.removeItem('selected_channels_for_distribute'); } catch (e3) {}
              }
              window.location.href = redirectUrl;
            } catch (err) {
              console.error('保存失败:', err);
              Toast.error('保存失败，可能是存储空间不足。请尝试删除一些旧的屏保主题后重试。');
            }
          }).catch(function(err) {
            console.error('图片处理失败:', err);
            Toast.error('素材处理失败，请重试');
          });
        }

        runPersistEditedThemeAndRedirect();
      }

      }
      if (editBackConfirmCancel) {
        editBackConfirmCancel.addEventListener('click', closeEditBackConfirmModal);
      }
      if (editBackConfirmOk) {
        editBackConfirmOk.addEventListener('click', function() {
          closeEditBackConfirmModal();
          backToThemeListFromEdit();
        });
      }
      if (editBackConfirmModal) {
        editBackConfirmModal.addEventListener('click', function(e) {
          if (e.target === editBackConfirmModal) closeEditBackConfirmModal();
        });
      }
      document.addEventListener('keydown', function(e) {
        if (e.key !== 'Escape') return;
        if (editBackConfirmModal && !editBackConfirmModal.classList.contains('hidden')) {
          e.preventDefault();
          closeEditBackConfirmModal();
        }
      });
    })();
  </script>
</body>
</html>
